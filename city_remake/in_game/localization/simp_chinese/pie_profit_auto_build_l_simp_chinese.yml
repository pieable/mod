l_simp_chinese:
 pie_profit_auto_build: "利润自动建设"
 pie_profit_auto_build_desc: "按照最低利润与国库存款保留线，自动挑选各地点最有收益的可建建筑。"
 pie_profit_auto_build_intro: "每月会先执行上月算好的建设方案，再为下个月重新计算。利润值来自界面侧的建筑收益接口，因此重算会通过一个隐藏界面桥完成。"
 pie_profit_auto_build_controls: "自动建设控制"
 pie_profit_auto_build_controls_desc: "启用地点后，系统只会在没有民用建设、满足利润阈值、且建造后不会低于黄金储备时开工。"
 pie_profit_auto_build_profit_threshold: "利润阈值"
 pie_profit_auto_build_profit_threshold_tt: "每级收益低于此数值的建筑不会被自动建造。设为 0 可关闭此过滤。"
 pie_profit_auto_build_profit_threshold_dec_tt: "点击: #bold -0.01#!\n右键: #bold -0.1#!\nCtrl+点击: #bold -1#!\nShift+点击: #bold 重置为0#!"
 pie_profit_auto_build_profit_threshold_inc_tt: "点击: #bold +0.01#!\n右键: #bold +0.1#!\nCtrl+点击: #bold +1#!\nShift+点击: #bold 最大值5#!"
 pie_profit_auto_build_gold_limit: "黄金储备"
 pie_profit_auto_build_gold_limit_tt: "自动建设会保留的国库存款。若本月已排建设会一并计入，避免连续开工把国库压到阈值以下。设为 0 可关闭此限制。"
 pie_profit_auto_build_gold_limit_dec_tt: "点击: #bold -10#!\n右键: #bold -100#!\nCtrl+点击: #bold -500#!\nShift+点击: #bold -5000#!"
 pie_profit_auto_build_gold_limit_inc_tt: "点击: #bold +10#!\n右键: #bold +100#!\nCtrl+点击: #bold +500#!\nShift+点击: #bold +5000#!"
 pie_profit_auto_build_gold_limit_reset_tt: "把黄金储备阈值重置为 0。"
 pie_profit_auto_build_reset: "重置"
 pie_profit_auto_build_recalc: "重新计算"
 pie_profit_auto_build_recalc_tt: "立即为已启用地点重新计算最优建筑。调整利润阈值时也会自动触发一次重算。"
 pie_profit_auto_build_toggle_all: "切换全部地点"
 pie_profit_auto_build_toggle_all_tt: "点击: 如果已有地点启用，则全部关闭；否则启用全部地点。\n右键: 同样逻辑，但只作用于核心地点。"
 pie_profit_auto_build_disable_all: "全部关闭"
 pie_profit_auto_build_disable_all_tt: "关闭所有地点的利润自动建设。"
 pie_profit_auto_build_notes: "说明"
 pie_profit_auto_build_notes_text: "• 自动建设排除特殊建筑与阶层建筑\n• 原料必须能在当地市场生产\n• 已满级或正在建设的建筑不会继续扩建\n• 利润计算依赖界面桥，通常会在下一次月度脉冲前准备好结果\n• 建造发生在月度脉冲，因此第一次启用后通常要等到下一月才会开工"
