 game_concept_city_remake_wiki:0 "城市重制"
 game_concept_city_remake_wiki_desc:0 "#T 城市重制#!\n这里是本模组的游戏内百科。它不是概念宣传页，而是把各系统真正会检查的条件、计算方式、花费和结果写出来，方便你在游戏中随时查。\n\n上方按钮可以切换七个部分：#Y 与阶层交易#!、#Y 土地和官僚机制#!、#Y 消费增长#!、#Y 阶层城市化#!、#Y 新增阶层特色建筑#!、#Y 战争修改#!、#Y 城市项目#!。\n\n总览会依次列出所有部分的摘要；进入某个分类后，只显示该分类的详细卡片。"

 game_concept_city_remake_wiki_estate_trade:0 "与阶层交易"
 game_concept_city_remake_wiki_estate_trade_desc:0 "#T 与阶层交易#!\n国家不在战争中，且国内存在贵族、教士或市民时，可以和阶层谈交易。进入界面后先选择交易对象，再搭配条款；只要至少选择一项条款、交易接受度不低于0，并通过资金、债务槽、贷款容量、土地或项目合法性检查，就可以成交。\n\n可用条款包括金币、年利率、阶层资助项目、地方经营权、王室强制命令、阶层特权、出售王室土地、授予未登记土地、买回阶层土地，以及转让城市项目。\n\n几个必须记住的限制：界面里的正数金币表示王室向阶层借钱，金额不会超过该阶层当前金库；负数金币表示王室付款给阶层，金额不会超过王室现有国库。王室借钱需要空债务槽；王室付款时，利率会被锁定为0。"

 game_concept_city_remake_wiki_estate_trade_terms:0 "交易条款"
 game_concept_city_remake_wiki_estate_trade_terms_desc:0 "#T 交易条款#!\n#Y 金币条款#!：正数是阶层借钱给王室，阶层金库减少、王室金币增加，并生成一笔阶层债务；负数是王室直接付款给阶层，王室金币减少、阶层金库增加。\n\n#Y 土地条款#!：出售王室土地时，只能选择非首都、可拥有、没有围城、没有劫掠、当前属于王室直辖的地点；授予未登记土地时，只能选择没有正式归属的传统土地；买回土地时，只能选择非首都、没有围城或劫掠、且当前属于所选阶层的地点。出售王室土地会让该阶层满意度+0.03，授予未登记土地+0.02，买回土地-0.05。\n\n#Y 项目条款#!：只有正在进行的城镇或城市项目才能转让，而且当前项目资助者必须就是交易对象；接收方必须是另一个不同阶层。转让成功后，项目后续建设、完成事件、自动建筑和土地归属都会改由接收阶层决定。\n\n#Y 附加条款#!：阶层资助项目会让该阶层满意度-0.05；授予地方经营权会让该阶层满意度+0.05；王室强制命令可以放进任何交易，但它只会补足当前接受度缺口。"

 game_concept_city_remake_wiki_estate_trade_acceptance:0 "交易接受度"
 game_concept_city_remake_wiki_estate_trade_acceptance_desc:0 "#T 交易接受度#!\n交易接受度必须达到0。系统会把条款价值统一折算成月贸易与税收收入，大约10点接受度相当于1个月收入。对阶层不利的条款还会乘以势力对比系数：系数=(所选阶层势力+0.05)/(王室势力+0.05)，范围为0.5到3.0。阶层越强、王室越弱，王室索取资源或撤回权利就越贵。\n\n#Y 金币#!：正数金币是王室借钱。系统不会按本金全额扣接受度，而是按流动性和风险成本计算：贵族35%、教士22%、市民18%，再乘势力对比和该阶层已有债务压力。王室付款给阶层时，则按全额月收入数提供接受度。\n\n#Y 利率#!：利率只在王室借钱时提供接受度，计算为本金对应月收入数*年利率*4年*10。界面利率上限为25%。基础贷款条款会借约6个月收入，并自动估算接近风险成本的年利率。\n\n#Y 固定条款#!：阶层资助项目=-100*势力对比；授予地方经营权=+250；王室强制命令只补足当前交易的接受度缺口，本来已经能接受的交易不会因此额外获利。强制命令上限按王室势力折算为10到30个月收入，也就是+100到+300接受度。\n\n#Y 土地、项目和特权#!：土地价值=200+人口*2+税基*6，范围200到900。出售王室土地按全额土地价值提供接受度；授予未登记土地按土地价值的65%提供接受度；买回土地会在土地价值上加80后再乘势力对比。项目转让基础为-60，设施投入会额外造成-40/-80/-120。特权接受度按原版权力值生成，撤销特权再乘势力对比。"

 game_concept_city_remake_wiki_estate_trade_debt:0 "阶层债务"
 game_concept_city_remake_wiki_estate_trade_debt_desc:0 "#T 阶层债务#!\n贵族、教士和市民各有8个阶层债务槽。王室向某个阶层借钱前，必须确认该阶层还有空槽，并且交易后的全部阶层债务不会超过国家贷款容量。\n\n新债务期限为60个月。每月支付给出借阶层的利息=本金*年利率/12；这套利息独立于原版银行贷款利率。到期后本金不会自动消失，而是触发到期债务事件，你可以偿还本金，也可以展期5年并继续按原利率付息。\n\n王室强制命令代价很重：它会立刻造成一次严重稳定惩罚，使所选阶层满意度-0.15，并添加10年国家修正#Y 王室强制命令#!，效果为全局王室阶层权力-0.20、每月正统性-0.10。它能压下谈判缺口，但会长期削弱王室在阶层体系中的地位。"

 game_concept_city_remake_wiki_land_bureaucracy:0 "土地和官僚机制"
 game_concept_city_remake_wiki_land_bureaucracy_desc:0 "#T 土地和官僚机制#!\n本模组为地点增加了土地归属：王室、贵族、教士、市民、农民，或者未登记传统权利。土地归属会同时用地点变量和地点修正记录；地点换主人时会清除旧归属，避免征服后直接继承上一任统治者的产权。\n\n官僚覆盖决定王室能不能清查土地。清查不是免费改变量，而是一项内阁行动：花钱、花时间，把有登记机关的核心或整合地点重新登记为王室土地。"

 game_concept_city_remake_wiki_land_ownership:0 "土地归属"
 game_concept_city_remake_wiki_land_ownership_desc:0 "#T 土地归属#!\n#Y 可授予土地#!：目标必须是可拥有陆地、有拥有者、由本国控制、非首都、无围城、未劫掠，且当前没有明确归属或属于王室。贵族、教士、市民接收土地时，国家中必须存在对应阶层。\n\n#Y 土地授予评分#!：基础为地点税基；如果当前是王室土地，+20；如果所选阶层在当地相对阶层势力>=0.34，+25；如果地方控制<0.5，-10。\n\n#Y 被动宣称#!：未登记土地在非征服状态下可能被地方势力吸收。当地相对阶层势力>25%的阶层可以参与自动取得土地；如果多个阶层同时满足条件，会在符合者之间随机确定归属。贵族还需要地方控制<0.75，并有城堡、庄园、贵族代表或防御建筑；教士还需要教区、教堂区、寺庙、大教堂、修道院等宗教建筑；市民还需要市场、行会、市政或商业建筑；农民自由地还需要控制>=0.5，并有办事处、市政中心或市场广场。"

 game_concept_city_remake_wiki_land_integration:0 "征服地整合"
 game_concept_city_remake_wiki_land_integration_desc:0 "#T 征服地整合#!\n自然整合候选地必须是可拥有陆地、有拥有者、由本国控制、非首都、无围城、未劫掠，整合等级为征服，当前没有被内阁整合、没有明确土地归属，并且存在一个地方辅助力量。\n\n每次整合进度最低0、最高12。辅助力量存在+2；主流或接受文化+3，容忍文化+2，中立文化+1，否则-1；国教+3，同宗教组+1，否则-2；地方控制>=0.5再+1，>=0.75再+1；宗教统一度>=0.75再+1；辅助阶层满意度>=0.65再+2；地方控制<0.25再-2。\n\n辅助力量的基础门槛是：辅助阶层满意度>=0.45，并且当地相对阶层势力>25%。贵族还需要地方控制<0.6或有贵族/军事建筑；教士还需要宗教合适，或宗教统一度>=0.7且有宗教建筑；市民还需要市场接入>=0.7且有商业建筑；农民还需要控制>=0.45，并且文化接近或有公共建筑。多个辅助阶层同时符合时，整合后的土地归属会在他们之间随机确定。"

 game_concept_city_remake_wiki_bureaucracy_coverage:0 "官僚覆盖"
 game_concept_city_remake_wiki_bureaucracy_coverage_desc:0 "#T 官僚覆盖#!\n官僚点数来自建筑等级：乡村办事处每级+1，法警每级+2，城市市政中心每级+3，地方总督每级+8，海军总督每级+8，稳定开支建筑每级+4，宫廷开支建筑每级+2。官僚覆盖率=官僚点数*100/全国地点数。\n\n王室土地清查是一项18个月行政内阁行动，启动花费100金币，并且不能并行。国家必须满足官僚清查条件、至少有100金币，且目标省份内存在合格候选地。\n\n清查候选地必须是核心或整合、非首都、无围城、未劫掠、有登记机关、不是王室土地，并且当前属于未登记、贵族、教士、市民或农民土地。登记机关包括乡村办事处、城市市政中心、法警、地方总督和海军总督。清查评分=税基+地方控制*50；有登记机关+20；阶层土地+35，农民土地+20，未登记传统权利+10。"

 game_concept_city_remake_wiki_consumption_growth:0 "消费增长"
 game_concept_city_remake_wiki_consumption_growth_desc:0 "#T 消费增长#!\n消费增长由三部分组成：人口财富会放大商品需求，食物安全会影响人口增长，富裕和控制会改变迁移吸引。简单说，地方越富、市场越通、食物越稳，人口需求和人口吸引就越强；饥荒、劫掠和昂贵食物会直接打断这种增长。"

 game_concept_city_remake_wiki_pop_consumption:0 "人口消费"
 game_concept_city_remake_wiki_pop_consumption_desc:0 "#T 人口消费#!\n地方财富由税基、地方控制和人口税基权重共同决定。税基权重为：贵族人口*150，教士*25，市民*20，劳工/农民/士兵/奴隶*1，部落民*0.01。有效控制最低按0.01计算，避免控制太低时出现异常结果。\n\n财富倍率范围：贵族、教士、市民最低0.5最高4；平民和部落民最低0.8最高4。财富会按人口类型转化为额外需求：贵族最多+0.8，教士+0.9，市民+1.25，劳工/农民/士兵+1.5，部落民+0.75，奴隶+0.15；全局额外值最高1.5。\n\n市场接入会决定这些需求能释放多少。高档消费=1-(1-市场接入)*0.55，最低0.45；中档消费=1-(1-市场接入)*0.30，最低0.70；低档消费=1-(1-市场接入)*0.10，最低0.90。最终高/中/低消费倍率=1+财富额外需求*对应市场释放率，最高2.5。"

 game_concept_city_remake_wiki_food_growth:0 "食物与人口增长"
 game_concept_city_remake_wiki_food_growth_desc:0 "#T 食物与人口增长#!\n食物安全会自动给地点修正：省份食物比例>=50%且<100%，并且月食物产量>=100时，地点人口增长+0.0002；省份食物比例>=100%且月食物产量>=150时，地点人口增长+0.0004，迁移吸引+0.05。\n\n原版食物修正也被调整：正向省份食物增长改为当地人口增长+0.0008；地点食物昂贵改为当地人口增长-0.002。\n\n劫掠的打击更重：敌对食物乘数-0.10，人口增长-0.15，繁荣衰减+0.1，月发展修正-0.25，最大损耗+5。省份饥荒会造成人口增长-0.25、补给上限-25%、迁移吸引-1、人口降级速度+50%、上层阶级容量-50%、寿命-10、迁移速度+25%，并允许部落民、劳工和农民迁出。"

 game_concept_city_remake_wiki_wealth_attraction:0 "财富吸引力"
 game_concept_city_remake_wiki_wealth_attraction_desc:0 "#T 财富吸引力#!\n税基会按阈值增加迁移吸引：地点税基>=5时+0.025，>=15再+0.025，>=30再+0.04，>=60再+0.06。达到60税基时，合计迁移吸引+0.15。\n\n控制修正也被改动：高控制会带来贸易保护+0.50、农民权利+0.50、迁移吸引+0.05。也就是说，控制力不只是减少叛乱，它还会提高贸易安全和人口稳定性。"

 game_concept_city_remake_wiki_estate_urbanization:0 "阶层城市化"
 game_concept_city_remake_wiki_estate_urbanization_desc:0 "#T 阶层城市化#!\n贵族、教士和市民会使用自己的阶层金库，把乡村推动为城镇，再把城镇推动为城市。普通城镇事件要求阶层金库>=700；城市事件要求阶层金库>=2200。玩家批准后会改变地点等级、记录城市来源，并建造对应阶层的特色建筑；拒绝会降低对应阶层满意度。\n\n月度检查权重如下：贵族城镇、边疆城镇、贵族城市各为1；教士城镇和教士城市各为1；市民城镇为3，市民城市为2。因此市民城市化更常见，但仍然必须满足候选条件和资金门槛。"

 game_concept_city_remake_wiki_urbanization_candidates:0 "城市化候选地"
 game_concept_city_remake_wiki_urbanization_candidates_desc:0 "#T 城市化候选地#!\n普通城镇的共同条件：人口>=5，繁荣度>=0.5，省份最大食物>=1000，非首都，由本国控制，并且当前不是城镇或城市。\n\n边疆贵族城镇要求目标是乡村，地方控制>0且<=0.25，税基>=地方控制*15，人口>=5，省份最大食物>=1000，并且是本国核心或已整合。普通贵族城镇需要地方控制>=0.6；教士城镇需要国教人口比例>=0.8；市民城镇需要市场接入>=0.85。\n\n城市共同条件：人口>=30，繁荣度>=0.9，并有首都连接。首都连接可以是道路连首都，也可以是非海外港口且不直接连首都。城市还必须满足三种发展基础之一：农业基础为省份最大食物>=3000且月食物产量>=300；商业基础为税基>=30且市场接入>=0.95；行政基础为有地方总督或海军总督。贵族城市额外需要控制>=0.8；教士城市需要国教人口比例>=0.95；市民城市需要市场接入>=0.98。"

 game_concept_city_remake_wiki_urbanization_estate_logic:0 "阶层推动逻辑"
 game_concept_city_remake_wiki_urbanization_estate_logic_desc:0 "#T 阶层推动逻辑#!\n贵族路线重控制和军事：乡村可先变为贵族庄园城镇或边疆贵族城镇，城市阶段会建贵族宫廷。教士路线重宗教人口比例和宗教建筑，城市阶段会建经院城市。市民路线重市场接入和商业基础，城镇阶段会建市场城镇，城市阶段会建交易所城市。\n\n自动投资基础设施有固定顺序。贵族乡村只补乡村办事处；教士乡村补教区教堂；市民乡村依次补市集、手工业作坊、公共粮仓、水井、排水沟。城市阶段，贵族补市政中心和城墙；教士补教堂区、救济院，并在发展>=20时补医院；市民补市场广场、行会区、仓库、水渠、下水道。\n\n玩家手动改变地点等级时，也会写入来源变量：玩家城镇和玩家城市会被标记，后续自动建筑和降级清理会用这些变量判断。"

 game_concept_city_remake_wiki_urban_origin_downgrade:0 "来源记录与降级"
 game_concept_city_remake_wiki_urban_origin_downgrade_desc:0 "#T 来源记录与降级#!\n城市来源记录包括：贵族城镇/城市、教士城镇/城市、市民城镇/城市、玩家城镇/城市。来源会决定自动建筑、项目归属，以及降级时需要清理哪些建筑和变量。\n\n人口不足会按月累计。城镇人口<2.5时进入降级计时；城市人口<15时进入降级计时。连续12个月后，城市降为城镇，城镇降为乡村。降级会清除对应来源变量，并拆除由阶层城市化跟踪的特色建筑。"

 game_concept_city_remake_wiki_estate_buildings:0 "新增的阶层特色建筑"
 game_concept_city_remake_wiki_estate_buildings_desc:0 "#T 新增的阶层特色建筑#!\n本模组新增三类建筑：阶层城市化自动生成的特色建筑、乡村和城市基础设施、资源产业与国家开支建筑。阶层特色建筑通常不能手动建造，也不能手动拆除，而是由事件或项目完成时建成。\n\n市民交易所城市还有全国叠加效果：每座交易所城市添加一层国家修正，税收效率+0.01，银行利率-0.005。王室强制命令也是国家修正，效果为全局王室阶层权力-0.20、每月正统性-0.10，持续10年。"

 game_concept_city_remake_wiki_auto_estate_buildings:0 "自动阶层建筑"
 game_concept_city_remake_wiki_auto_estate_buildings_desc:0 "#T 自动阶层建筑#!\n#Y 贵族庄园城镇#!：城镇、贵族、单级、不可手建拆。维护：布料0.10、纸张0.10、家具0.10、精致布料0.05、蜂蜡0.05。效果：当地人力+0.03，征召规模+20%，月威望+0.005，人口增长+0.0005，贵族期望人口+0.005。\n\n#Y 边疆贵族城镇#!：维护：布料0.08、纸张0.05、武器0.05、木材0.05、工具0.05。效果：月发展+0.001，加入叛军阈值-0.04，离开叛军阈值-0.02，当地贵族权力+1.0，农民权利-0.35，生产效率+0.10。\n\n#Y 贵族宫廷城市#!：维护：布料0.15、纸张0.25、书籍0.10、家具0.15、精致布料0.10、蜂蜡0.10。效果：当地人力修正+50%，文化影响+1，文化传统+1，月威望+0.02，贵族期望人口缩放+0.01。\n\n#Y 教区城镇#!：维护：纸张0.05、书籍0.10、布料0.05、蜂蜡0.10。效果：人口转化速度+0.05，月识字+0.05，教士最大识字+10，教士权力+0.25，教士期望人口缩放+0.01。\n\n#Y 经院城市#!：维护：纸张0.35、书籍0.30、玻璃0.10、精致布料0.05、蜂蜡0.10。效果：月识字+0.10，教士最大识字+15，教士权力+0.5，教士期望人口缩放+0.05；如果在首都，国家传教速度+25%，研究速度+5%，并给教士目标满意度增加小型永久值。\n\n#Y 市场城镇#!：维护：布料0.10、纸张0.05、玻璃0.05、家具0.05、工具0.05。效果：当地建造成本-10%，每市民贸易+0.1，市民期望人口缩放+0.05。\n\n#Y 交易所城市#!：维护：布料0.15、纸张0.20、玻璃0.10、家具0.10、工具0.10。效果：生产效率+20%，距首都传播速度+10%，每市民贸易+0.2，市民期望人口缩放+0.05。"

 game_concept_city_remake_wiki_added_infrastructure_buildings:0 "新增基础设施建筑"
 game_concept_city_remake_wiki_added_infrastructure_buildings_desc:0 "#T 新增基础设施建筑#!\n#Y 乡村设施#!：市集给免费建筑等级+50、市场接入+0.005、建造成本-3%、月繁荣+0.0005、劳工期望人口+0.5；乡村办事处给最大控制+0.025、月繁荣+0.0005、贵族期望人口+0.025，并提供1点官僚点；教区教堂给最大控制+0.025、月识字+0.02、转化速度+0.001、月繁荣+0.0005、教士期望人口+0.05；手工业作坊给晋升速度+10%、生产效率+5%、建造成本-3%、月繁荣+0.0005、市民期望人口+0.5；公共粮仓给食物容量+500、月食物修正+5%、人口增长+0.0002、动乱-0.01；水井给人口容量+40、迁移吸引+0.1、疾病抗性+0.01、月繁荣+0.0005；排水沟给人口容量+10%、迁移吸引+0.05、疾病抗性+0.025、寿命+0.5、动乱-0.01、月繁荣+0.0005。\n\n#Y 城市设施#!：市场广场会替代市集，给免费建筑等级+100、农民权利+0.15、迁移吸引+0.05、市场接入+0.01、建造成本-5%、月繁荣+0.001、劳工期望人口+1.0；市政中心替代乡村办事处，给最大控制+0.05、动乱-0.025、月繁荣+0.001、贵族期望人口+0.05，并提供3点官僚点；教堂区给最大控制+0.05、月识字+0.05、转化速度+0.005、月繁荣+0.001、教士期望人口+0.1；行会区给晋升速度+25%、生产效率+10%、建造成本-5%、月繁荣+0.001、市民期望人口+1.0；城墙给防御+15%、守军规模+10%、最大控制+0.025、动乱-0.025、月繁荣+0.0005、士兵期望人口+0.25；仓库给市场接入+0.005、月繁荣+0.0005，若为市场中心则最大库存容量+50；水渠给人口容量+75、迁移吸引+0.2、疾病抗性+0.025；下水道给人口容量+25、人口容量修正+25%、迁移吸引+0.15、疾病抗性+0.05、寿命+1、动乱-0.02；救济院给食物容量+500、疾病抗性+0.05、寿命+1、月食物修正+5%、人口增长+0.0003、动乱-0.025。"

 game_concept_city_remake_wiki_added_resource_expense_buildings:0 "资源和开支建筑"
 game_concept_city_remake_wiki_added_resource_expense_buildings_desc:0 "#T 资源和开支建筑#!\n#Y 资源产业#!：新增复合资源建筑，最大等级使用乡村建筑容量，雇佣劳工，价格使用农业或矿业扩建价格。谷物农庄覆盖小麦、稻米、粟、豆类、玉米、马铃薯、牲畜；基础金属矿覆盖铜、锡、铅、铁、煤、硝石、明矾；特殊矿物工坊覆盖宝石、大理石、汞、金、银、琥珀；马场覆盖马、羊毛、纤维作物、牲畜；河海渔业覆盖鱼、珍珠、盐；毛皮营地覆盖野味、毛皮、蜂蜡、木材、药材、象牙；咖啡或香料种植园覆盖咖啡、茶、丝绸、染料、熏香、葡萄酒、可可、胡椒、丁香、藏红花、辣椒。\n\n生产方式分为本地资源和非本地资源。本地资源通常输出1.00或1.05；非本地谷物类通常输出0.70到0.85；牲畜非本地输出0.80。同一建筑可以代表相近产业，但原生资源地效率更高。\n\n#Y 开支建筑#!：宫廷开支建筑只能在首都存在，最大等级99999，雇佣贵族0.020，效果为免费建筑等级+1、每市民贸易+0.05、王室阶层权力+0.02；外交开支建筑只能在首都存在，雇佣贵族0.012，效果为免费建筑等级+1、每市民贸易+0.05、商人容量+0.15，并在首都给全国外交官+0.005；稳定开支建筑只能在首都存在，雇佣教士0.018，效果为免费建筑等级+1、食物容量+25、人口容量+0.02。开支建筑的生产方式会把宫廷、外交、稳定预算转化为纸张、书籍、家具、奢侈品、食物、武器、火器、火炮等真实商品需求，并按宗教禁酒规则切换宴会或接待配方。"

 game_concept_city_remake_wiki_war_changes:0 "战争修改"
 game_concept_city_remake_wiki_war_changes_desc:0 "#T 战争修改#!\n战争修改把长期战争拆成几类压力：军队损耗、有效力量疲惫、外交压力、占领压力、首都状态和饥饿围城。战争中每月更新；不在战争时，会清除所有战争势头变量和修正。\n\n原版总占领战争疲惫被抵消：#Y total_occupied#!注入月战争疲惫-0.4，实际压力改由本模组的占领势头系统计算。"

 game_concept_city_remake_wiki_war_momentum:0 "战争势头"
 game_concept_city_remake_wiki_war_momentum_desc:0 "#T 战争势头#!\n系统每月记录军事强度、常备军规模、当前人力和最大人力。有效军队=军事强度-最大人力；人力上限=常备军规模*4；有效人力=min(当前人力, 人力上限)；有效力量=有效军队+有效人力。有效力量会记录战争期间峰值。\n\n军队惩罚size=1-当前合计有效力量/峰值，范围0到1。该size应用国家修正#Y 战争势头：军队#!，基础效果为全局防御-0.5，按size缩放。有效力量疲惫size=1-有效力量/潜在峰值，范围0到1；被困参战者减半。该size应用#Y 战争势头：疲惫#!，基础效果为月战争疲惫+0.5，按size缩放。\n\n占领惩罚按地点权重计算：要塞权重5，非要塞权重1。占领size=被占权重/总权重，范围0到1。修正#Y 战争势头：占领#!基础为全局防御-0.5、月战争疲惫+2，按size缩放。首都地点还会获得size=军队惩罚+占领惩罚的本地修正，基础为本地防御+0.25；如果首都被敌人控制，国家额外获得全局防御-0.25。"

 game_concept_city_remake_wiki_civil_war_pressure:0 "外交压力与内战权重"
 game_concept_city_remake_wiki_civil_war_pressure_desc:0 "#T 外交压力与内战权重#!\n有限外交附庸与宗主同战时，会把战争疲惫压给战争领袖：贡献=附庸战争疲惫*附庸税基/领袖税基*0.001；贡献低于0.001时会被忽略。\n\n联盟战争中，非领袖参与者贡献=(战争疲惫-5)*参与者税基/领袖税基*0.001。疲惫高于5会增加领袖压力，低于5可能减少压力。总外交压力限制在-1到1，并添加国家修正#Y 战争势头：外交压力#!，基础为月战争疲惫+1.0，按size缩放。\n\n内战占领压力单独计算：己方权重=要塞数*4+地点数，对手同理；如果己方权重低于对手，内战惩罚=1-己方权重/对手权重。最终占领压力取普通占领size和内战惩罚的较大值。"

 game_concept_city_remake_wiki_siege_starvation:0 "饥饿围城"
 game_concept_city_remake_wiki_siege_starvation_desc:0 "#T 饥饿围城#!\n饥饿围城目标必须是城镇或城市、正在被围攻、当前没有战斗，且所在省份处于饥荒状态。满足条件时，每月给该地点的饥饿围城月份+1；条件中断时，计数和修正都会清除。\n\n达到6个月：添加35天地点修正#Y 饥饿围城压力#!，基础效果为本地防御-0.05、守军增长-50%，并每月围城进度+1。达到9个月：每月围城进度+2。达到12个月：围城进度+20，并把守军规模设为0。\n\n因此粮食不只是背景数值。缺粮城市被围6个月后，城防会开始实质崩溃；拖到12个月，结果会接近强制失守。"

 game_concept_city_remake_wiki_city_projects:0 "城市项目"
 game_concept_city_remake_wiki_city_projects_desc:0 "#T 城市项目#!\n城市项目是阶层城市化的项目化版本。国家每年推进项目，阶层先支付基础设施预算；项目完成后，再支付城镇或城市基础费用，并触发对应阶层城市化事件。\n\n启动新项目要求国家不在战争、月结余>=0、贷款少于3、没有破产。项目地点不能是首都，也不能已经有其他城市化项目。"

 game_concept_city_remake_wiki_project_capacity:0 "项目容量"
 game_concept_city_remake_wiki_project_capacity_desc:0 "#T 项目容量#!\n城镇项目容量基础为1；国家税基>=50、150、300、600、1000、1600时各+1，最高基础容量7。城市项目容量基础为1；国家税基>=300、600、1000、1600、2500时各+1，最高基础容量6。\n\n项目候选评分=最大控制*50 + min(税基,80)*0.4 + 市场接入*12 + 宗教分。宗教分：国教人口比例>=0.8时+6，>=0.5时+3。这个评分用于从候选地点中挑选更适合投资的地点。\n\n基础候选：城镇项目需要乡村、人口>=5、省份最大食物>=1000；城市项目需要城镇、人口>=20。项目维持条件更低：城镇项目人口>=3且省份最大食物>=500；城市项目人口>=15。围城或劫掠会让项目失效。"

 game_concept_city_remake_wiki_project_flow:0 "项目流程"
 game_concept_city_remake_wiki_project_flow_desc:0 "#T 项目流程#!\n项目预算按缺失设施预留：每个乡村基础设施预留100，每个城市基础设施预留200。实际建设时，对应阶层金库也必须至少有100或200。\n\n城镇项目建造顺序：公共粮仓、水井、排水沟、乡村办事处、教区教堂、市集、手工业作坊。项目完成要求：仍是乡村，满足普通城镇条件，拥有完整乡村到城镇设施组，资助阶层能支付700基础费用，并满足阶层条件：贵族控制>=0.6，教士国教人口>=0.8，市民市场接入>=0.85。\n\n城市项目建造顺序：先补公共粮仓/救济院、水井/水渠、排水沟/下水道、乡村办事处/市政中心、教区教堂/教堂区、市集/市场广场、手工业作坊/行会区，再依次建市场广场、市政中心、教堂区、行会区、城墙、仓库、水渠、下水道、救济院，并在发展>=20时补医院。完成要求：仍是城镇，满足城市共同条件，拥有完整城市设施组，资助阶层能支付2200基础费用，并满足阶层条件：贵族控制>=0.8，教士国教人口>=0.95，市民市场接入>=0.98。\n\n完成后：贵族城镇建贵族庄园，教士城镇建教区城镇，市民城镇建市场城镇；贵族城市建贵族宫廷，教士城市建经院城市，市民城市建交易所城市。完成时会改变地点等级、写入来源变量，并把土地归属设为资助阶层。"

 game_concept_city_remake_wiki_project_transfer:0 "项目转让"
 game_concept_city_remake_wiki_project_transfer_desc:0 "#T 项目转让#!\n项目转让通过阶层交易完成。只有当前资助者是交易对象、项目正在进行、并且指定了另一个不同接收阶层时，转让条款才有效。\n\n接受度惩罚由三部分组成：基础-60、项目设施惩罚、阶层权力差惩罚。设施惩罚按已投入规模计算：城镇项目设施分>=2/4/6时-40/-80/-120，城市项目设施分>=2/5/8时-40/-80/-120。惩罚还会乘负面交易权力系数。\n\n转让成功后，项目变量改为新阶层。后续预算检查、基础设施建设、完成事件、自动特色建筑和土地归属全部按新阶层处理。"
