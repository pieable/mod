 pie_estate_trade_acceptance_line_gold_borrow_principal: "\n\n#Y 借款本金#!：[GetPlayer.MakeScope.ScriptValue('pie_et_gold_principal_acceptance')|+=0]\n  金额折合收入月数：[GetPlayer.MakeScope.ScriptValue('pie_et_gold_income_months')|2]\n  每月收入折算：×[GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_per_income_month')|0]\n  流动性与违约风险：×[GetPlayer.MakeScope.ScriptValue('pie_et_selected_estate_credit_liquidity_cost')|2]\n  势力对比：×[GetPlayer.MakeScope.ScriptValue('pie_et_negative_trade_acceptance_factor')|2]\n  现有债务压力：×[GetPlayer.MakeScope.ScriptValue('pie_et_selected_estate_credit_pressure_factor')|2]"
 pie_estate_trade_acceptance_line_gold_payment: "\n\n#Y 王室付款#!：[GetPlayer.MakeScope.ScriptValue('pie_et_gold_principal_acceptance')|+=0]\n  金额折合收入月数：[GetPlayer.MakeScope.ScriptValue('pie_et_gold_income_months')|2]\n  每月收入折算：×[GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_per_income_month')|0]"
 pie_estate_trade_acceptance_line_gold_interest: "\n\n#Y 年利率#!：[GetPlayer.MakeScope.ScriptValue('pie_et_gold_interest_acceptance')|+=0]\n  金额折合收入月数：[GetPlayer.MakeScope.ScriptValue('pie_et_gold_income_months')|2]\n  年利率：[GetPlayer.MakeScope.Var('pie_et_interest').GetValue|%2]\n  估值年数：[GetPlayer.MakeScope.ScriptValue('pie_et_loan_interest_valuation_years')|0]\n  每月收入折算：×[GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_per_income_month')|0]"
 pie_estate_trade_acceptance_line_estate_funds_project: "\n\n#Y 阶层资助城市化#!：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_estate_funds_project_acceptance')|+=0]\n  基础值：-100\n  势力对比：×[GetPlayer.MakeScope.ScriptValue('pie_et_negative_trade_acceptance_factor')|2]"
 pie_estate_trade_acceptance_line_crown_grants_rights: "\n\n#Y 转让地方土地权#!：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_crown_grants_rights_acceptance')|+=0]\n  基础值：+250"
 pie_estate_trade_acceptance_line_royal_command: "\n\n#Y 王室强制命令#!：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_royal_command_acceptance')|+=0]\n  当前缺口：[GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_value_without_royal_command')|+=0]\n  命令上限：[GetPlayer.MakeScope.ScriptValue('pie_et_royal_credit_pledge_acceptance_cap')|0]\n  王室势力：[GetPlayer.MakeScope.ScriptValue('pie_et_crown_power_value')|%0]"
 pie_estate_trade_acceptance_line_sell_land: "\n\n#Y 出售王室土地#!：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_sell_land_acceptance')|+=0]\n  单块土地价值=200+人口×2+税基×6，范围200到900。"
 pie_estate_trade_acceptance_line_grant_unregistered_land: "\n\n#Y 授予未登记土地#!：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_grant_unregistered_land_acceptance')|+=0]\n  按土地价值的65%计价。"
 pie_estate_trade_acceptance_line_buy_land: "\n\n#Y 买回阶层土地#!：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_buy_land_acceptance')|+=0]\n  每块土地=(土地价值+80)×势力对比。\n  当前势力对比：×[GetPlayer.MakeScope.ScriptValue('pie_et_negative_trade_acceptance_factor')|2]"
 pie_estate_trade_acceptance_line_project: "\n\n#Y 城市项目#!：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_project_acceptance')|+=0]\n  基础转让：[GetPlayer.MakeScope.ScriptValue('pie_et_project_transfer_base_acceptance')|+=0]\n  阶层势力差额：[GetPlayer.MakeScope.ScriptValue('pie_et_project_estate_power_gap_acceptance_penalty')|+=0]\n  基础设施惩罚：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_project_infrastructure_acceptance')|+=0]"
 pie_estate_trade_acceptance_line_privilege: "\n\n#Y 特权条款#!：[GetPlayer.MakeScope.ScriptValue('pie_et_selected_privilege_acceptance')|+=0]\n  授予按原版特权阶层力量×10计入。\n  撤销再乘势力对比：×[GetPlayer.MakeScope.ScriptValue('pie_et_negative_trade_acceptance_factor')|2]"
