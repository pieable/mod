 pie_estate_trade_acceptance_tt: "#T 接受度明细#!\n接受度仍是交易成交分数；内部按月贸易与税收收入折算，约 #Y 10#! 接受度等于 #Y 1#! 个月收入。\n\n总计：[GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_value')|+=0]\n$pie_estate_trade_acceptance_breakdown_lines$"
