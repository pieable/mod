 pie_survey_crown_land_province_none: "当前没有可清丈土地的省份。目标省份内必须有由你拥有并控制、已整合或核心、未被围攻或劫掠，且当地有乡公所、市政中心、执达署、地方总督治所或海军总督治所的传统土地或阶层土地。"

