l_simp_chinese:
 pie_estate_urbanization: "阶层城市化"
 pie_estate_urbanization_desc: "城市与集镇不再只是玩家点出来的抽象等级，而是阶层力量在地方社会中的长期沉淀。谁出资建立它们，谁就会在当地留下自己的社会结构与政治影响。"

 pie_estate_urbanization_auto_build_controls: "自动建设"
 pie_estate_urbanization_auto_build_desc: "在这个局势里统一管理自动建设。利润自动建设会按地点挑选收益最高的可建建筑；基础设施自动建设会按固定顺序补齐村社、集镇和城市的基础建筑。"
 pie_estate_urbanization_profit_auto_build_header: "利润自动建设"
 pie_estate_urbanization_profit_threshold: "利润阈值"
 pie_estate_urbanization_profit_threshold_tt: "每级收益低于此数值的建筑不会被自动建造。设为 0 可关闭此过滤。"
 pie_estate_urbanization_profit_threshold_dec_tt: "点击: #bold -0.01#!\n右键: #bold -0.1#!\nCtrl+点击: #bold -1#!\nShift+点击: #bold 重置为0#!"
 pie_estate_urbanization_profit_threshold_inc_tt: "点击: #bold +0.01#!\n右键: #bold +0.1#!\nCtrl+点击: #bold +1#!\nShift+点击: #bold 最大值5#!"
 pie_estate_urbanization_gold_limit: "黄金储备"
 pie_estate_urbanization_gold_limit_tt: "自动建设会保留的国库存款。若本月已排建设会一并计入，避免连续开工把国库压到阈值以下。设为 0 可关闭此限制。"
 pie_estate_urbanization_gold_limit_dec_tt: "点击: #bold -10#!\n右键: #bold -100#!\nCtrl+点击: #bold -500#!\nShift+点击: #bold -5000#!"
 pie_estate_urbanization_gold_limit_inc_tt: "点击: #bold +10#!\n右键: #bold +100#!\nCtrl+点击: #bold +500#!\nShift+点击: #bold +5000#!"
 pie_estate_urbanization_gold_limit_reset_tt: "把黄金储备阈值重置为 0。"
 pie_estate_urbanization_reset: "重置"
 pie_estate_urbanization_recalc: "重新计算"
 pie_estate_urbanization_recalc_tt: "立即为已启用地点重新计算最优建筑。调整利润阈值时也会自动触发一次重算。"
 pie_estate_urbanization_toggle_all: "切换全部地点"
 pie_estate_urbanization_toggle_all_on: "切换全部地点：开"
 pie_estate_urbanization_toggle_all_core: "切换全部地点：核心"
 pie_estate_urbanization_toggle_all_off: "切换全部地点：关"
 pie_estate_urbanization_toggle_all_tt: "点击: 如果已有地点启用，则全部关闭；否则启用全部地点。\n右键: 开启非核心时切换为只建核心；只建核心时关闭核心；关闭时启用核心。"
 pie_estate_urbanization_disable_all: "全部关闭"
 pie_estate_urbanization_disable_all_tt: "关闭所有地点的利润自动建设。"
 pie_estate_urbanization_basic_infra_header: "基础设施自动建设"
 pie_estate_urbanization_basic_infra_on: "基础设施自动建设: 开"
 pie_estate_urbanization_basic_infra_off: "基础设施自动建设: 关"
 pie_estate_urbanization_basic_infra_toggle_tt: "开关基础设施自动建设。开启后，每月会在满足筛选条件且没有民用建设的地点，按固定顺序建造下一个可建的基础建筑。"
 pie_estate_urbanization_infra_control: "最低控制力"
 pie_estate_urbanization_infra_control_tt: "控制力低于此值的地点不会自动补基础设施。"
 pie_estate_urbanization_infra_wealth: "最低财富"
 pie_estate_urbanization_infra_wealth_tt: "当地财富低于此值的地点不会自动补基础设施。"
 pie_estate_urbanization_infra_market: "最低市场接入度"
 pie_estate_urbanization_infra_market_tt: "市场接入度低于此值的地点不会自动补基础设施。"
 pie_estate_urbanization_infra_percent_dec_tt: "点击: #bold -5%#!\nCtrl+点击: #bold -25%#!\nShift+点击: #bold 重置为0#!"
 pie_estate_urbanization_infra_percent_inc_tt: "点击: #bold +5%#!\nCtrl+点击: #bold +25%#!"
 pie_estate_urbanization_infra_wealth_dec_tt: "点击: #bold -5#!\nCtrl+点击: #bold -25#!\nShift+点击: #bold 重置为0#!"
 pie_estate_urbanization_infra_wealth_inc_tt: "点击: #bold +5#!\nCtrl+点击: #bold +25#!"
 pie_estate_urbanization_basic_infra_order: "建造顺序：村社粮仓 → 水井 → 排水沟 → 贵族集镇基础设施 → 教士集镇基础设施 → 市民集镇基础设施 → 市民城市基础设施 → 贵族城市基础设施 → 教士城市基础设施 → 水渠 → 下水道 → 济贫院 → 医院 → 城墙。"

 pie_estate_urbanization_overview: "点击下方按钮后进入选地块模式。系统会自动判断目标是集镇还是城市、是核心地块还是未整合地块、以及它最初由哪个阶层或玩家自己建立。"
 pie_estate_urbanization_estate_ledger: "阶层账本"
 pie_estate_urbanization_income_line: "悬停可查看该阶层的上月收入与支出明细。"
 pie_estate_urbanization_requirements: "建造条件"
 pie_estate_urbanization_requirements_intro: "下面列的是各阶层主动建立集镇或城市时会检查的条件。城市升级会先吃通用条件，再吃对应阶层的额外门槛。"
 pie_estate_urbanization_requirements_common_town_header: "集镇通用条件"
 pie_estate_urbanization_requirements_common_town: "• 目标地点由你控制\n• 不能是首都\n• 总人口至少 #Y 5#!\n• 繁荣度至少 #Y 50%#!\n• 所在省份食物容量至少 #Y 1000#!"
 pie_estate_urbanization_requirements_common_city_header: "城市通用条件"
 pie_estate_urbanization_requirements_common_city: "• 目标地点由你控制\n• 不能是首都\n• 总人口至少 #Y 30#!\n• 繁荣度至少 #Y 90%#!\n• 必须有通往首都的道路，或满足海军总督治所那套港口替代条件\n• 还需满足以下任一类型：农业型（省食物容量至少 #Y 3000#! 且每月食物产出至少 #Y 300#!）、商业型（当地[tax_base|e]至少 #Y 30#! 且市场接入度至少 #Y 95%#!）、行政型（建有地方总督治所或海军总督治所）"
 pie_estate_urbanization_requirements_nobles_header: "贵族额外条件"
 pie_estate_urbanization_requirements_nobles: "• 建立边境贵族集镇：目标必须是#Y 25% 控制力及以下#!的#Y 乡村#!地块，且当地[tax_base|e]至少 #Y 15#!，并且是#Y 已整合#!或#Y 核心#!地块；贵族阶层结余至少 #Y 700#!\n• 建立贵族集镇：当地控制力至少 #Y 60%#!，且贵族阶层结余至少 #Y 700#!\n• 扩建贵族城市：当地控制力至少 #Y 80%#!，且贵族阶层结余至少 #Y 2200#!"
 pie_estate_urbanization_requirements_clergy_header: "教士额外条件"
 pie_estate_urbanization_requirements_clergy: "• 建立教士集镇：当地国教人口比例至少 #Y 80%#!，且教士阶层结余至少 #Y 700#!\n• 扩建教士城市：当地国教人口比例至少 #Y 95%#!，且教士阶层结余至少 #Y 2200#!"
 pie_estate_urbanization_requirements_burghers_header: "市民额外条件"
 pie_estate_urbanization_requirements_burghers: "• 建立市民集镇：当地市场接入度至少 #Y 85%#!，且市民阶层结余至少 #Y 700#!\n• 扩建市民城市：当地市场接入度至少 #Y 98%#!，且市民阶层结余至少 #Y 2200#!"
 pie_estate_urbanization_requirements_notes_header: "补充说明"
 pie_estate_urbanization_requirements_notes: "• 开局自带、但还没有阶层来源标记的既有集镇和城市，不会再被重新升格；它们满足同样条件时，会直接触发“补建阶层特色建筑”的事件\n• 玩家自己手动升级出来的地点，会被记录为玩家来源，不会自动算作某个阶层建立"

 pie_destroy_urban_location: "摧毁城镇/城市"
 pie_destroy_urban_location_desc: "通过局势面板接管城镇和城市的摧毁流程。进入选地块模式后，可以选择任意属于你的集镇或城市。"
 pie_destroy_urban_location_button: "摧毁城镇/城市"
 pie_destroy_urban_location_effects: "核心地块上的阶层城镇会按建立来源削减对应阶层满意度；未整合地块会额外付出稳定度与当地人口满意度下降的代价。已经失去阶层来源的旧有城镇则只需要支付金钱。"
 pie_destroy_urban_location_conditions: "必须拥有目标地块，且该地块是集镇或城市。"
 pie_destroy_urban_location_select: "选择要摧毁的城镇"
 pie_destroy_urban_location_none: "当前没有可摧毁的集镇或城市。"
 pie_destroy_urban_location_fail_tt: "没有可摧毁的目标地块。"

 pie_destroy_estate_urban_building: "摧毁阶层特色建筑"
 pie_destroy_estate_urban_building_desc: "只拆除地块上的阶层特色建筑，不会让该地块降回乡村。拆除后会清除该地块的阶层建城来源，使其变成普通的旧有集镇或城市。"
 pie_destroy_estate_urban_building_button: "摧毁阶层特色建筑"
 pie_destroy_estate_urban_building_effects: "核心地块上的阶层特色建筑会按建立来源削减对应阶层满意度，但比直接拆毁整座城镇少 5%；未整合地块则只会承受更轻的稳定度与当地人口满意度代价。"
 pie_destroy_estate_urban_building_conditions: "目标地块必须是你的集镇或城市，且其上存在阶层特色建筑。"
 pie_destroy_estate_urban_building_select: "选择要拆除特色建筑的地块"
 pie_destroy_estate_urban_building_none: "当前没有可拆除阶层特色建筑的集镇或城市。"
 pie_destroy_estate_urban_building_fail_tt: "没有可拆除阶层特色建筑的目标地块。"

 pie_register_crown_land: "登记土地"
 pie_register_crown_land_desc: "清丈并登记一块已整合或核心的传统土地，使其成为王室直辖地。"
 pie_register_crown_land_select: "选择要登记的传统土地"
 pie_register_crown_land_none: "当前没有可登记为王室直辖地的传统土地。目标必须由你拥有并控制，已整合或为核心，未被围攻或劫掠，尚未登记土地归属，并且当地有乡公所、市政中心、执达署、地方总督治所或海军总督治所。"
 pie_register_crown_land_fail_tt: "目标地块现在不能登记为王室直辖地。"
