l_simp_chinese:
 pie_rural_market_fair: "草市"
 pie_rural_market_fair_desc: "这片集镇集散地由定期市集、牲畜交易和临时摊棚构成，是周边村社最早出现的稳定交换空间。它提供#Y +50#!建筑等级上限、#Y +500#!劳工岗位、少量市场接入度与建造成本减免，并提供#Y +0.05%#!每月繁荣度。"

 pie_rural_village_office: "乡公所"
 pie_rural_village_office_desc: "乡约、里正和账册在这里汇集，零散村社开始被纳入更稳定的集镇治理框架。它提供#Y +25#!贵族岗位、#Y +2.5%#!最大控制力、少量叛乱度降低与建造成本减免，并提供#Y +0.05%#!每月繁荣度。"

 pie_rural_parish_church: "堂区教堂"
 pie_rural_parish_church_desc: "这座堂区教堂为周边集镇与村社提供礼拜、识字和登记服务，也让地方社会更容易被整合进教区秩序。它提供#Y +50#!教士岗位、#Y +2.5%#!最大控制力、少量月识字率与人口转教速度，并提供#Y +0.05%#!每月繁荣度。"

 pie_rural_handicraft_workshop: "手工业作坊"
 pie_rural_handicraft_workshop_desc: "纺织、制革、木工和金属匠铺开始在这里集中，集镇社会由此出现了稳定的非农生产核心。它提供#Y +500#!市民岗位、#Y +10%#!本地人口升级速度、少量生产效率与建造成本减免，并提供#Y +0.05%#!每月繁荣度。"

 pie_rural_communal_granary: "村社粮仓"
 pie_rural_communal_granary_desc: "谷仓、晒场和简易配给点让村社能更稳地储粮、调剂和应对歉收，也为日后更正式的济贫与赈济体系打下基础。它提供#Y +75#!本地食物容量、少量食物增长与叛乱度降低。"

 pie_rural_wells_and_drainage: "水井"
 pie_rural_wells_and_drainage_desc: "水井、蓄水池和引水沟让聚落获得了更稳定的清洁水源，也为后续更复杂的引水工程打下基础。它提供#Y +40K#!本地人口容量、少量迁入吸引力与疾病抗性，并提供#Y +0.05%#!每月繁荣度。"

 pie_rural_drainage_ditch: "排水沟"
 pie_rural_drainage_ditch_desc: "简易排水沟和污水明渠让聚落在雨季与污秽中不至于迅速失序，也为更完整的排污系统预留了雏形。它提供#Y +10%#!本地人口容量、少量疾病抗性、寿命加成与叛乱度降低，并提供#Y +0.05%#!每月繁荣度。"

 pie_urban_market_square: "市场广场"
 pie_urban_market_square_desc: "广场、摊位与作坊围绕在一起，构成了一座城市最基础的交易空间。它提供#Y +100#!建筑等级上限、#Y +1000#!劳工岗位、#Y +15%#!农民自主权、市场接入度与建造成本减免，并提供#Y +0.10%#!每月繁荣度。"

 pie_urban_civic_center: "市政中心"
 pie_urban_civic_center_desc: "市政厅、法庭与文书机构在这里集中办公，城市的秩序和税务也由此向四周辐射。它提供#Y +50#!贵族岗位、#Y +5%#!最大控制力、叛乱度降低与更快的政令传导，并提供#Y +0.10%#!每月繁荣度。"

 pie_urban_church_quarter: "教堂区"
 pie_urban_church_quarter_desc: "主教座堂、修院与教会学校汇聚于此，为城市提供精神权威与公共秩序。它提供#Y +100#!教士岗位、#Y +5%#!最大控制力、月识字率与人口转教速度，并提供#Y +0.10%#!每月繁荣度。"

 pie_urban_guild_quarter: "行会区"
 pie_urban_guild_quarter_desc: "行会作坊和商人会馆在此聚集，成为市民阶层向上流动和组织生产的核心。它提供#Y +1000#!市民岗位、#Y +25%#!本地人口升级速度、生产效率与建造成本减免，并提供#Y +0.10%#!每月繁荣度。"

 pie_urban_city_walls: "城墙"
 pie_urban_city_walls_desc: "高墙、塔楼和守备设施定义了城市的边界，也为城市本身提供了可长期维持的安全感。它提供#Y +250#!士兵岗位、额外防御、驻军规模、少量最大控制力与叛乱度降低，并提供#Y +0.05%#!每月繁荣度。"

 pie_urban_warehouse: "仓库"
 pie_urban_warehouse_desc: "大量货物在这里被集中保管、分拣和再分发。若该地是市场中心，还会为所属市场额外提供#Y +50#!库存上限。它同时提供少量商人承载能力、市场接入度与更快的政令传导，并提供#Y +0.05%#!每月繁荣度。"

 pie_urban_aqueduct: "引水渠"
 pie_urban_aqueduct_desc: "虽然在另一个世界里，它似乎只配换来可怜的两点住房，但在这里，可靠的引水工程是真正的大城市命脉。它提供#Y +75K#!本地人口容量、迁入吸引力与少量疾病抗性，并提供#Y +0.05%#!每月繁荣度。"

 pie_urban_sewer: "下水道"
 pie_urban_sewer_desc: "虽然在另一个世界里，它看起来也只是一个+2住房的小设施，但真正的城市若没有排污系统，很快就会被自己淹没。它提供#Y +25K#!本地人口容量、#Y +25%#!本地人口容量、疾病抗性、寿命加成与叛乱度降低，并提供#Y +0.05%#!每月繁荣度。"

 pie_urban_relief_house: "济贫院"
 pie_urban_relief_house_desc: "施粥所、贫民院和临时安置设施，能在歉收和动荡时托住城市最脆弱的人群。它提供#Y +150#!本地食物容量、食物增长、少量疾病抗性、寿命加成与叛乱度降低，并提供#Y +0.05%#!每月繁荣度。"
