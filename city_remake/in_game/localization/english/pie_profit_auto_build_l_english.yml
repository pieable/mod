l_english:
 pie_profit_auto_build: "Profit Auto-Build"
 pie_profit_auto_build_desc: "Automatically picks each location's most profitable available building while respecting a minimum profit and gold reserve."
 pie_profit_auto_build_intro: "Each month runs the plan calculated last month, then prepares the next one. The profit value comes from the UI building-income bridge, so recalculation is handled by a hidden widget."
 pie_profit_auto_build_controls: "Auto-Build Controls"
 pie_profit_auto_build_controls_desc: "Enabled locations only build when they have no civil construction, meet the profit threshold, and can pay without dropping below the gold reserve."
 pie_profit_auto_build_profit_threshold: "Profit Threshold"
 pie_profit_auto_build_profit_threshold_tt: "Buildings below this per-level income will not be auto-built. Set to 0 to disable the filter."
 pie_profit_auto_build_profit_threshold_dec_tt: "Click: #bold -0.01#!\nRight-click: #bold -0.1#!\nCtrl-click: #bold -1#!\nShift-click: #bold reset to 0#!"
 pie_profit_auto_build_profit_threshold_inc_tt: "Click: #bold +0.01#!\nRight-click: #bold +0.1#!\nCtrl-click: #bold +1#!\nShift-click: #bold set to 5#!"
 pie_profit_auto_build_gold_limit: "Gold Reserve"
 pie_profit_auto_build_gold_limit_tt: "Gold kept in reserve for auto-build. Spending already queued this month is counted too, so multiple builds do not push the treasury below the reserve. Set to 0 to disable."
 pie_profit_auto_build_gold_limit_dec_tt: "Click: #bold -10#!\nRight-click: #bold -100#!\nCtrl-click: #bold -500#!\nShift-click: #bold -5000#!"
 pie_profit_auto_build_gold_limit_inc_tt: "Click: #bold +10#!\nRight-click: #bold +100#!\nCtrl-click: #bold +500#!\nShift-click: #bold +5000#!"
 pie_profit_auto_build_gold_limit_reset_tt: "Reset the gold reserve to 0."
 pie_profit_auto_build_reset: "Reset"
 pie_profit_auto_build_recalc: "Recalculate"
 pie_profit_auto_build_recalc_tt: "Immediately recalculates the best building for enabled locations. Changing the profit threshold also triggers recalculation."
 pie_profit_auto_build_toggle_all: "Toggle All Locations"
 pie_profit_auto_build_toggle_all_tt: "Click: if any location is enabled, disable all; otherwise enable all locations.\nRight-click: same logic, but only for core locations."
 pie_profit_auto_build_disable_all: "Disable All"
 pie_profit_auto_build_disable_all_tt: "Disable profit auto-build in all locations."
 pie_profit_auto_build_notes: "Notes"
 pie_profit_auto_build_notes_text: "• Special buildings and estate buildings are excluded\n• Construction materials must be produced in the local market\n• Full buildings and buildings already under construction are skipped\n• Profit calculation depends on the hidden UI bridge and is normally ready before the next monthly pulse\n• Construction happens on the monthly pulse, so the first build usually starts one month after enabling"
