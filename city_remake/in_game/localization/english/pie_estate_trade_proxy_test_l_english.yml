l_english:
 cb_pie_proxy_trade_test: "Estate Proxy Test"
 cb_pie_proxy_trade_test_desc: "Temporary test casus belli used to verify whether sea-based proxy countries can enter a war and reach the peace interface."

 pie_proxy_trade_test.hidden.title: "Hidden"
 pie_proxy_trade_test.hidden.desc: "Hidden"

 pie_proxy_trade_test.1.title: "Estate Proxy War Test"
 pie_proxy_trade_test.1.desc: "This test will try to create a temporary proxy country in #bold South Pacific Ocean#! and immediately declare a war on it.\n\nOrder of testing:\n1. Try a #bold building-country#! on a sea location.\n2. If that fails, try a #bold location-country#! on the same sea location.\n\nThe goal is simple: verify whether this kind of proxy can actually enter the hardcoded war and peace pipeline."
 pie_proxy_trade_test.1.start: "Start the automatic test"
 pie_proxy_trade_test.1.start.tt: "Runs the building-on-sea test first. If war creation fails, the event silently falls back to the location-on-sea test."
 pie_proxy_trade_test.1.cleanup: "Clean up previous test proxies"
 pie_proxy_trade_test.1.cleanup.tt: "White peaces any running proxy-test war, removes the truce both ways, and annexes all temporary proxy countries created by this sample."
 pie_proxy_trade_test.1.cancel: "Not now"

 pie_proxy_trade_test.10.title: "Building Proxy Succeeded"
 pie_proxy_trade_test.10.desc: "The #bold building-country#! was successfully created on the sea location, and the test war was created.\n\nThat means your first idea is at least viable for the #bold war entry#! part of the estate-trade shell.\n\nNext check in-game:\n- Open the current war panel\n- Click the peace negotiation button\n- See whether the proxy country behaves cleanly enough for your trade-shell use"

 pie_proxy_trade_test.20.title: "Location Proxy Succeeded"
 pie_proxy_trade_test.20.desc: "The building-country attempt did not work cleanly enough, but the fallback #bold location-country#! on the sea location did create successfully and accepted the test war.\n\nThat means your second idea is the current working fallback for the #bold war entry#! part.\n\nNext check in-game:\n- Open the current war panel\n- Click the peace negotiation button\n- See whether the proxy country behaves cleanly enough for your trade-shell use"

 pie_proxy_trade_test.30.title: "Sea Proxy Test Failed"
 pie_proxy_trade_test.30.desc: "Neither of the two current sea-anchor tests produced a working war target.\n\nFailed sequence:\n- building-country on sea location\n- location-country on the same sea location\n\nAt this point, the safer fallback is still a frozen remote land location, or a separate follow-up test where a sea-based location-country is converted into #bold country_type = navy#! after creation."

 pie_proxy_trade_test.40.title: "Test Blocked"
 pie_proxy_trade_test.40.desc: "The automatic test was blocked because you are already at war.\n\nPlease run this sample while at peace, otherwise it becomes hard to tell whether the created war really came from the proxy test."

 pie_proxy_trade_test.90.title: "Proxy Test Cleaned Up"
 pie_proxy_trade_test.90.desc: "All temporary proxy countries created by this sample were cleaned up, and any active proxy-test war was white peaced first."

 pie_proxy_trade_test.keep_open: "Got it, I will inspect the war and peace UI now"
 pie_proxy_trade_test.cleanup_now: "Clean it up now"
 pie_proxy_trade_test.cleanup_now.tt: "Immediately white peace the test war, clear the resulting truce both ways, and annex the temporary proxy country."
 pie_proxy_trade_test.cleanup_now_impassable.tt: "Immediately white peace the test war, clear the resulting truce both ways, and annex the temporary proxy country. Because this test may seed ownership on an impassable tile, use a disposable save."
 pie_proxy_trade_test.30.ok: "Understood"
 pie_proxy_trade_test.40.ok: "Understood"
 pie_proxy_trade_test.90.ok: "Done"

 pie_proxy_trade_test.101.title: "Impassable Proxy War Test"
 pie_proxy_trade_test.101.desc: "This test uses #bold Eiriksfjord#!, an impassable Greenland location.\n\nOrder of testing:\n1. Direct #bold building-country#! on the impassable location.\n2. Direct #bold location-country#! on the same impassable location.\n3. If both fail, temporarily give the impassable location an owner and then try a #bold building-country#!.\n4. If that still fails, temporarily give it an owner and try a #bold location-country#!.\n\nThis lets us separate two different questions:\n- Is the problem just that the location is unowned?\n- Or does the impassable terrain itself break the proxy-country route?"
 pie_proxy_trade_test.101.start: "Start the impassable-location test"
 pie_proxy_trade_test.101.start.tt: "Runs direct creation on Eiriksfjord first. If that fails, the sample also tries the same location again after temporarily assigning an owner."
 pie_proxy_trade_test.101.cleanup: "Clean up previous proxy-test countries"
 pie_proxy_trade_test.101.cleanup.tt: "White peaces any running proxy-test war, removes truce both ways, and annexes the temporary proxy countries. Use a disposable save if you are testing seeded ownership on an impassable location."
 pie_proxy_trade_test.101.cancel: "Not now"

 pie_proxy_trade_test.110.title: "Direct Impassable Building Proxy Succeeded"
 pie_proxy_trade_test.110.desc: "A #bold building-country#! was created directly on the impassable location, and the test war was created.\n\nThis is the cleanest result. It means an impassable location may be usable as a proxy-country anchor without any ownership seeding."

 pie_proxy_trade_test.120.title: "Direct Impassable Location Proxy Succeeded"
 pie_proxy_trade_test.120.desc: "The direct building-country attempt did not work, but a #bold location-country#! created directly on the impassable location did enter the test war.\n\nThat means the impassable location itself is not the blocker; the more specific blocker is the building-country route."

 pie_proxy_trade_test.130.title: "Seeded Impassable Building Proxy Succeeded"
 pie_proxy_trade_test.130.desc: "Direct creation on the impassable location did not work, but the proxy was created successfully once the location was temporarily given an owner first.\n\nThat means the main blocker was probably the #bold missing owner/overlord requirement#!, not the impassable terrain itself.\n\nUse a disposable save while inspecting this result, because this route may leave ownership traces on the impassable location."

 pie_proxy_trade_test.140.title: "Seeded Impassable Location Proxy Succeeded"
 pie_proxy_trade_test.140.desc: "The impassable location only worked after it was temporarily given an owner first, and the successful route was #bold location-country#!.\n\nThat means this path is currently the strongest impassable-anchor candidate, even if it still comes with ownership-side-effect risk."

 pie_proxy_trade_test.150.title: "Impassable Proxy Test Failed"
 pie_proxy_trade_test.150.desc: "All four impassable-location routes failed:\n- direct building-country\n- direct location-country\n- owner-seeded building-country\n- owner-seeded location-country\n\nIf this result holds, the remaining route worth testing is still the naval shell: create a normal proxy country from a valid location first, then convert it to #bold country_type = navy#!."
 pie_proxy_trade_test.150.ok: "Understood"

 pie_proxy_trade_test.190.title: "Impassable Proxy Test Cleaned Up"
 pie_proxy_trade_test.190.desc: "The temporary proxy countries created by the impassable-location sample were cleaned up. If you used the owner-seeded route, inspect Eiriksfjord before saving, because ownership on an impassable tile may still have changed."
 pie_proxy_trade_test.190.ok: "Done"

 pie_proxy_trade_test.201.title: "Greenland Navy Proxy Test"
 pie_proxy_trade_test.201.desc: "This test follows the original pirate pattern more closely. It looks for an unowned, ownable, coastal land location in Greenland, creates a country from that location, immediately changes that country to #bold country_type = navy#!, and then tries to declare the proxy-test war.\n\nThis is the cleanest test of the 'special proxy body' route."
 pie_proxy_trade_test.201.start: "Start the navy-proxy test"
 pie_proxy_trade_test.201.cleanup: "Clean up previous navy-proxy tests"
 pie_proxy_trade_test.201.cancel: "Not now"

 pie_proxy_trade_test.210.title: "Navy Proxy Succeeded"
 pie_proxy_trade_test.210.desc: "The Greenland test location produced a country successfully, that country was converted to #bold navy#!, and the test war was created.\n\nThis is the strongest result so far for the special-proxy route. The next thing to inspect in-game is whether the peace negotiation button also works cleanly against this navy proxy."

 pie_proxy_trade_test.220.title: "No Valid Greenland Test Location"
 pie_proxy_trade_test.220.desc: "The script could not find any unowned, ownable, coastal land location in Greenland.\n\nThat usually means one of two things:\n- this save no longer has a free Greenland anchor location\n- or Greenland is the wrong region to rely on for a reusable proxy shell later in the campaign\n\nSo yes, your concern about Greenland eventually becoming unavailable is real."
 pie_proxy_trade_test.220.ok: "Understood"

 pie_proxy_trade_test.250.title: "Navy Proxy Failed"
 pie_proxy_trade_test.250.desc: "The script found a Greenland test location and tried the pirate-style route, but the chain still failed before a working test war was established.\n\nThat means one of these links is still breaking:\n- create country from location\n- change country type to navy\n- declare war on the new navy country\n\nThis result is still valuable, because it isolates the failure to the actual navy route instead of the old sea or impassable experiments."
 pie_proxy_trade_test.250.ok: "Understood"

 pie_proxy_trade_test.290.title: "Navy Proxy Test Cleaned Up"
 pie_proxy_trade_test.290.desc: "The navy-proxy sample was cleaned up. Any test war was white peaced first, temporary proxy countries were annexed, and marked Greenland test locations were abandoned back to no owner."
 pie_proxy_trade_test.290.ok: "Done"
