 pie_estate_trade_acceptance_tt: "#T Acceptance Breakdown#!\nAcceptance remains the final deal score; internally, about #Y 10#! acceptance equals #Y 1#! month of trade and tax income.\n\nTotal: [GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_value')|+=0]\n$pie_estate_trade_acceptance_breakdown_lines$"
 pie_estate_trade_acceptance_breakdown_lines: "[SelectLocalization(GreaterThan_CFixedPoint(GetPlayer.MakeScope.Var('pie_et_gold').GetValue, '(CFixedPoint)0'), 'pie_estate_trade_acceptance_line_gold_borrow_principal', '')][SelectLocalization(LessThan_CFixedPoint(GetPlayer.MakeScope.Var('pie_et_gold').GetValue, '(CFixedPoint)0'), 'pie_estate_trade_acceptance_line_gold_payment', '')][SelectLocalization(Not(EqualTo_CFixedPoint(GetPlayer.MakeScope.ScriptValue('pie_et_gold_interest_acceptance'), '(CFixedPoint)0')), 'pie_estate_trade_acceptance_line_gold_interest', '')][SelectLocalization(GetPlayer.MakeScope.Var('pie_et_term_estate_funds_project').IsSet, 'pie_estate_trade_acceptance_line_estate_funds_project', '')][SelectLocalization(GetPlayer.MakeScope.Var('pie_et_term_crown_grants_rights').IsSet, 'pie_estate_trade_acceptance_line_crown_grants_rights', '')][SelectLocalization(GetPlayer.MakeScope.Var('pie_et_term_royal_credit_pledge').IsSet, 'pie_estate_trade_acceptance_line_royal_command', '')][SelectLocalization(Not(EqualTo_CFixedPoint(GetPlayer.MakeScope.ScriptValue('pie_et_selected_sell_land_acceptance'), '(CFixedPoint)0')), 'pie_estate_trade_acceptance_line_sell_land', '')][SelectLocalization(Not(EqualTo_CFixedPoint(GetPlayer.MakeScope.ScriptValue('pie_et_selected_grant_unregistered_land_acceptance'), '(CFixedPoint)0')), 'pie_estate_trade_acceptance_line_grant_unregistered_land', '')][SelectLocalization(Not(EqualTo_CFixedPoint(GetPlayer.MakeScope.ScriptValue('pie_et_selected_buy_land_acceptance'), '(CFixedPoint)0')), 'pie_estate_trade_acceptance_line_buy_land', '')][SelectLocalization(Not(EqualTo_CFixedPoint(GetPlayer.MakeScope.ScriptValue('pie_et_selected_project_acceptance'), '(CFixedPoint)0')), 'pie_estate_trade_acceptance_line_project', '')][SelectLocalization(Not(EqualTo_CFixedPoint(GetPlayer.MakeScope.ScriptValue('pie_et_selected_privilege_acceptance'), '(CFixedPoint)0')), 'pie_estate_trade_acceptance_line_privilege', '')]"
 pie_estate_trade_acceptance_line_gold_borrow_principal: "\n\n#Y Borrowed principal#!: [GetPlayer.MakeScope.ScriptValue('pie_et_gold_principal_acceptance')|+=0]\n  Income months: [GetPlayer.MakeScope.ScriptValue('pie_et_gold_income_months')|2]\n  Acceptance per month: x[GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_per_income_month')|0]\n  Liquidity and default risk: x[GetPlayer.MakeScope.ScriptValue('pie_et_selected_estate_credit_liquidity_cost')|2]\n  Estate/crown power ratio: x[GetPlayer.MakeScope.ScriptValue('pie_et_negative_trade_acceptance_factor')|2]\n  Existing debt pressure: x[GetPlayer.MakeScope.ScriptValue('pie_et_selected_estate_credit_pressure_factor')|2]"
 pie_estate_trade_acceptance_line_gold_payment: "\n\n#Y Crown payment#!: [GetPlayer.MakeScope.ScriptValue('pie_et_gold_principal_acceptance')|+=0]\n  Income months: [GetPlayer.MakeScope.ScriptValue('pie_et_gold_income_months')|2]\n  Acceptance per month: x[GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_per_income_month')|0]"
 pie_estate_trade_acceptance_line_gold_interest: "\n\n#Y Interest rate#!: [GetPlayer.MakeScope.ScriptValue('pie_et_gold_interest_acceptance')|+=0]\n  Income months: [GetPlayer.MakeScope.ScriptValue('pie_et_gold_income_months')|2]\n  Yearly rate: [GetPlayer.MakeScope.Var('pie_et_interest').GetValue|%2]\n  Valuation years: [GetPlayer.MakeScope.ScriptValue('pie_et_loan_interest_valuation_years')|0]\n  Acceptance per month: x[GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_per_income_month')|0]"
