 pie_estate_trade_auto_terms: "Auto Terms"
 pie_estate_trade_auto_terms_tt: "Generate a routine loan deal: the crown borrows about 6 months of trade and tax income from the current estate, capped by that estate's treasury. The yearly interest rate is estimated from liquidity, estate/crown power ratio, and existing debt pressure. If acceptance is still negative, add land or privileges."
 pie_estate_trade_clear_terms: "Clear Terms"
 pie_estate_trade_clear_terms_tt: "Clears gold, yearly interest, and selected terms."
 pie_estate_trade_gold_tt: "Positive values mean the crown receives money from the estate; negative values mean the crown pays money to the estate. Positive amounts cannot exceed the current estate treasury, and negative amounts cannot exceed the crown treasury. Acceptance prices money by monthly trade and tax income: about #Y 10#! acceptance equals #Y 1#! month of income. When the crown borrows, principal is priced by liquidity and risk rather than full face value, and is affected by the estate/crown power ratio and that estate's existing debt. When the crown pays, it gives acceptance at full monthly-income value. Ctrl-click or right-click changes the amount by 100."
 pie_estate_trade_interest: "Yearly Rate"
 pie_estate_trade_interest_tt: "The yearly rate only applies to money lent by the estate to the crown, up to 25%. Interest acceptance is valued as roughly four years of interest; when the crown pays money, the yearly rate is locked to 0."
 pie_estate_trade_monthly_interest_short: "Monthly"
 pie_estate_trade_monthly_interest_tt: "If accepted, this becomes an independent debt, and this is the monthly interest paid by the crown to the estate for that debt. Principal is not repaid automatically."
 pie_estate_trade_estate_interest_expense: "Estate debt interest:"
 pie_estate_trade_estate_interest_expense_tt: "This is the mod's separate estate-debt interest expense and is not part of the vanilla Interest expense. Expand it to show each debt for the selected estate, its yearly rate, monthly interest, and remaining months to maturity."
 pie_economy_estate_interest_expense: "Estate Debt Interest"
 pie_economy_estate_interest_expense_tt: "Monthly interest paid to estates for loans created through estate trades. This is separate from the vanilla Interest expense."
