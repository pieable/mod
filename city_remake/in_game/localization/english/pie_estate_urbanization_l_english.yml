l_english:
 pie_estate_urbanization: "Estate Urbanization"
 pie_estate_urbanization_desc: "Towns and cities are no longer abstract ranks you simply click into existence. They become the long-term social imprint of estate power on local society. Whoever finances them will leave behind their own social structure and political influence."

 pie_estate_urbanization_auto_build_controls: "Auto-Build"
 pie_estate_urbanization_auto_build_desc: "Manage auto-building from this situation. Profit auto-build picks the best available building by location income, while basic infrastructure auto-build fills rural, town, and city infrastructure in a fixed order."
 pie_estate_urbanization_profit_auto_build_header: "Profit Auto-Build"
 pie_estate_urbanization_profit_threshold: "Profit Threshold"
 pie_estate_urbanization_profit_threshold_tt: "Buildings below this per-level income will not be auto-built. Set to 0 to disable the filter."
 pie_estate_urbanization_profit_threshold_dec_tt: "Click: #bold -0.01#!\nRight-click: #bold -0.1#!\nCtrl-click: #bold -1#!\nShift-click: #bold reset to 0#!"
 pie_estate_urbanization_profit_threshold_inc_tt: "Click: #bold +0.01#!\nRight-click: #bold +0.1#!\nCtrl-click: #bold +1#!\nShift-click: #bold set to 5#!"
 pie_estate_urbanization_gold_limit: "Gold Reserve"
 pie_estate_urbanization_gold_limit_tt: "Gold kept in reserve for auto-build. Spending already queued this month is counted too, so multiple builds do not push the treasury below the reserve. Set to 0 to disable."
 pie_estate_urbanization_gold_limit_dec_tt: "Click: #bold -10#!\nRight-click: #bold -100#!\nCtrl-click: #bold -500#!\nShift-click: #bold -5000#!"
 pie_estate_urbanization_gold_limit_inc_tt: "Click: #bold +10#!\nRight-click: #bold +100#!\nCtrl-click: #bold +500#!\nShift-click: #bold +5000#!"
 pie_estate_urbanization_gold_limit_reset_tt: "Reset the gold reserve to 0."
 pie_estate_urbanization_reset: "Reset"
 pie_estate_urbanization_recalc: "Recalculate"
 pie_estate_urbanization_recalc_tt: "Immediately recalculates the best building for enabled locations. Changing the profit threshold also triggers recalculation."
 pie_estate_urbanization_toggle_all: "Toggle All Locations"
 pie_estate_urbanization_toggle_all_tt: "Click: if any location is enabled, disable all; otherwise enable all locations.\nRight-click: same logic, but only for core locations."
 pie_estate_urbanization_disable_all: "Disable All"
 pie_estate_urbanization_disable_all_tt: "Disable profit auto-build in all locations."
 pie_estate_urbanization_basic_infra_header: "Basic Infrastructure Auto-Build"
 pie_estate_urbanization_basic_infra_on: "Infrastructure Auto-Build: On"
 pie_estate_urbanization_basic_infra_off: "Infrastructure Auto-Build: Off"
 pie_estate_urbanization_basic_infra_toggle_tt: "Toggle basic infrastructure auto-build. When enabled, each month eligible locations with no civil construction will build the next available basic building in the fixed order."
 pie_estate_urbanization_infra_control: "Minimum Control"
 pie_estate_urbanization_infra_control_tt: "Locations below this control value will not auto-build basic infrastructure."
 pie_estate_urbanization_infra_wealth: "Minimum Wealth"
 pie_estate_urbanization_infra_wealth_tt: "Locations below this local wealth value will not auto-build basic infrastructure."
 pie_estate_urbanization_infra_market: "Minimum Market Access"
 pie_estate_urbanization_infra_market_tt: "Locations below this market access value will not auto-build basic infrastructure."
 pie_estate_urbanization_infra_percent_dec_tt: "Click: #bold -5%#!\nCtrl-click: #bold -25%#!\nShift-click: #bold reset to 0#!"
 pie_estate_urbanization_infra_percent_inc_tt: "Click: #bold +5%#!\nCtrl-click: #bold +25%#!"
 pie_estate_urbanization_infra_wealth_dec_tt: "Click: #bold -5#!\nCtrl-click: #bold -25#!\nShift-click: #bold reset to 0#!"
 pie_estate_urbanization_infra_wealth_inc_tt: "Click: #bold +5#!\nCtrl-click: #bold +25#!"
 pie_estate_urbanization_basic_infra_order: "Build order: communal granary -> well -> drainage ditch -> noble town infrastructure -> clerical town infrastructure -> burgher town infrastructure -> burgher city infrastructure -> noble city infrastructure -> clerical city infrastructure -> aqueduct -> sewer -> relief house -> hospital -> city walls."

 pie_estate_urbanization_overview: "After clicking the button below, you will enter location selection mode. The system will automatically determine whether the target is a town or city, whether it is a core or integrated location, and which estate or player originally founded it."
 pie_estate_urbanization_estate_ledger: "Estate Ledger"
 pie_estate_urbanization_income_line: "Hover to see last month's income and expenses for this estate."
 pie_estate_urbanization_requirements: "Requirements"
 pie_estate_urbanization_requirements_intro: "Below are the conditions checked when estates proactively found towns or cities. City upgrades first check the common requirements, then the extra threshold for the relevant estate."
 pie_estate_urbanization_requirements_common_town_header: "Common Town Requirements"
 pie_estate_urbanization_requirements_common_town: "• You must control the target location\n• The target cannot be your capital\n• Total population must be at least #Y 5#!\n• Prosperity must be at least #Y 50%#!\n• The province must have at least #Y 1000#! food capacity"
 pie_estate_urbanization_requirements_common_city_header: "Common City Requirements"
 pie_estate_urbanization_requirements_common_city: "• You must control the target location\n• The target cannot be your capital\n• Total population must be at least #Y 30#!\n• Prosperity must be at least #Y 90%#!\n• The location must have a road connection to the capital, or meet the naval-governor-style port alternative\n• The location must also satisfy at least one city type: Agricultural (province food capacity at least #Y 3000#! and monthly food production at least #Y 300#!), Commercial (local [tax_base|e] at least #Y 30#! and market access at least #Y 95%#!), or Administrative (has a Local Governor or Naval Governor)"
 pie_estate_urbanization_requirements_nobles_header: "Noble Extra Requirements"
 pie_estate_urbanization_requirements_nobles: "• Frontier noble town: the target must be a #Y rural#! location at #Y 25% control or below#!, with local [tax_base|e] of at least #Y 15#!, and it must be either #Y integrated#! or a #Y core#!; the Noble Estate must have at least #Y 700#! in surplus\n• Noble town: local control must be at least #Y 60%#!, and the Noble Estate must have at least #Y 700#! in surplus\n• Noble city: local control must be at least #Y 80%#!, and the Noble Estate must have at least #Y 2200#! in surplus"
 pie_estate_urbanization_requirements_clergy_header: "Clergy Extra Requirements"
 pie_estate_urbanization_requirements_clergy: "• Clerical town: followers of the state religion must make up at least #Y 80%#! of the local population, and the Clergy Estate must have at least #Y 700#! in surplus\n• Clerical city: followers of the state religion must make up at least #Y 95%#! of the local population, and the Clergy Estate must have at least #Y 2200#! in surplus"
 pie_estate_urbanization_requirements_burghers_header: "Burgher Extra Requirements"
 pie_estate_urbanization_requirements_burghers: "• Burgher town: local market access must be at least #Y 85%#!, and the Burgher Estate must have at least #Y 700#! in surplus\n• Burgher city: local market access must be at least #Y 98%#!, and the Burgher Estate must have at least #Y 2200#! in surplus"
 pie_estate_urbanization_requirements_notes_header: "Notes"
 pie_estate_urbanization_requirements_notes: "• Pre-existing towns and cities from game start that do not yet have an estate-origin marker will not be re-founded. If they meet the same conditions, they will instead trigger an event to add the relevant estate's signature building\n• Locations upgraded manually by the player are recorded as player-founded and will not automatically count as being founded by any estate"

 pie_destroy_urban_location: "Destroy Town/City"
 pie_destroy_urban_location_desc: "Takes over the destruction flow for towns and cities through the situation panel. After entering location selection mode, you may choose any town or city you own."
 pie_destroy_urban_location_button: "Destroy Town/City"
 pie_destroy_urban_location_effects: "On core locations, destroying an estate-founded town or city will reduce the satisfaction of the estate that founded it. On non-integrated locations, there will also be a stability hit and a drop in local pop satisfaction. Older towns that have already lost their estate origin only require a monetary payment."
 pie_destroy_urban_location_conditions: "You must own the target location, and it must be a town or city."
 pie_destroy_urban_location_select: "Select a town or city to destroy"
 pie_destroy_urban_location_none: "There are currently no towns or cities that can be destroyed."
 pie_destroy_urban_location_fail_tt: "There is no valid target location to destroy."

 pie_destroy_estate_urban_building: "Destroy Estate Signature Building"
 pie_destroy_estate_urban_building_desc: "Removes only the estate signature building on the location without downgrading the location back to rural. Doing so also removes the estate urban origin from the location, turning it into an ordinary legacy town or city."
 pie_destroy_estate_urban_building_button: "Destroy Estate Signature Building"
 pie_destroy_estate_urban_building_effects: "On core locations, removing an estate signature building will reduce the satisfaction of the founding estate, but by 5% less than destroying the entire town or city. On non-integrated locations, only a lighter stability hit and local pop satisfaction penalty will apply."
 pie_destroy_estate_urban_building_conditions: "The target must be one of your towns or cities and must contain an estate signature building."
 pie_destroy_estate_urban_building_select: "Select a location whose signature building will be removed"
 pie_destroy_estate_urban_building_none: "There are currently no towns or cities with removable estate signature buildings."
 pie_destroy_estate_urban_building_fail_tt: "There is no valid target location whose estate signature building can be removed."

