 pie_estate_trade_acceptance_line_crown_grants_rights: "\n\n#Y Transfer local land rights#!: [GetPlayer.MakeScope.ScriptValue('pie_et_selected_crown_grants_rights_acceptance')|+=0]\n  Base: +250"
 pie_estate_trade_acceptance_line_royal_command: "\n\n#Y Royal command#!: [GetPlayer.MakeScope.ScriptValue('pie_et_selected_royal_command_acceptance')|+=0]\n  Current gap: [GetPlayer.MakeScope.ScriptValue('pie_et_acceptance_value_without_royal_command')|+=0]\n  Command cap: [GetPlayer.MakeScope.ScriptValue('pie_et_royal_credit_pledge_acceptance_cap')|0]\n  Crown power: [GetPlayer.MakeScope.ScriptValue('pie_et_crown_power_value')|%0]"
 pie_estate_trade_acceptance_line_sell_land: "\n\n#Y Sell crown land#!: [GetPlayer.MakeScope.ScriptValue('pie_et_selected_sell_land_acceptance')|+=0]\n  Each location value = 200 + population x2 + tax base x6, clamped from 200 to 900."
