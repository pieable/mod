 pie_manual_town_prosperity_tt: "Prosperity is at least 50%"
 pie_manual_town_food_capacity_tt: "Province food capacity is at least 1,000"
 pie_manual_town_control_tt: "Control is at least 70%"
 pie_estate_urbanization_projects_mapmode_button: "Urban Project Map"
 pie_estate_urbanization_projects_mapmode_button_tt: "Switch to a world map mode showing active estate town and city projects. Estate colors mark the sponsoring estate; striped overlays mark city projects."
