 pie_estate_trade_term_royal_credit_pledge: "Royal Command"
 pie_estate_trade_term_royal_credit_pledge_tt: "#T Royal Command#!\n#I Can be used in any trade. It only fills the current acceptance deficit; trades the estate already accepts gain no extra value.#!\n\nAcceptance: [GetPlayer.MakeScope.ScriptValue('pie_et_royal_credit_pledge_acceptance')|+=0]\nCap: royal authority is valued at about #Y 10-30#! months of income.\nOn acceptance: [ShowNamedValue('stability_severe_penalty')|+=2] [stability|e]\nOn acceptance: selected estate satisfaction #N -15%#!\nOn acceptance: gain [ShowModifier('pie_royal_credit_pledge')] for #Y 10 years#!\nModifier effect: Crown Estate Power #N -20%#!, Monthly Legitimacy #N -0.10#!"
