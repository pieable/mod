 NOICTHY_CW_CROWN_FORTS:0 "Befestigte Orte der [noicthy_civil_war_crown|E]"
 NOICTHY_CW_CROWN_LOCS:0 "Unbefestigte Orte der [noicthy_civil_war_crown|E]"
 NOICTHY_CW_PRETENDER_FORTS:0 "Befestigte Orte des [noicthy_civil_war_pretender|E]"
 NOICTHY_CW_PRETENDER_LOCS:0 "Unbefestigte Orte des [noicthy_civil_war_pretender|E]"
 game_concept_noicthy_civil_war_crown:0 "Krone"
 game_concept_noicthy_civil_war_crown_desc:0 "Territorium, das während eines Bürgerkriegs von der regierenden Regierung gehalten wird. Die Seite, die mehr gewichtetes Territorium kontrolliert (befestigte Orte zählen fünfmal mehr), erhält den Vorteil. Wenn die Krone weniger hält als der Prätendent, gelten Besatzungsstrafen."
 game_concept_noicthy_civil_war_pretender:0 "Prätendent"
 game_concept_noicthy_civil_war_pretender_desc:0 "Territorium, das während eines Bürgerkriegs von der Rebellenfraktion gehalten wird. Die Seite, die mehr gewichtetes Territorium kontrolliert (befestigte Orte zählen fünfmal mehr), erhält den Vorteil. Wenn der Prätendent mehr hält als die Krone, erleidet die Krone Besatzungsstrafen."
