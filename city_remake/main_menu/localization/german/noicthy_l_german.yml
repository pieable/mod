l_german:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "Verringert die Festungsverteidigung basierend darauf, wie viel der militärischen Stärke eines Landes seit dem Höchststand im Krieg verloren wurde."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "Erhöht die Kriegsmüdigkeit basierend darauf, wie viel der militärischen Stärke eines Landes erschöpft wurde. Die Kampfkraft der Armee und die Mannstärkereserven tragen beide bei."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "Die Kriegsmüdigkeit wird durch die Haltung von Untertanen und Koalitionspartnern beeinflusst. Kriegsmüde Verbündete üben Druck aus, während engagierte Koalitionsmitglieder mit geringer Kriegsmüdigkeit die Entschlossenheit des Kriegsführers stärken."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "Verringert die Festungsverteidigung und erhöht die Kriegsmüdigkeit basierend auf dem Anteil des Territoriums unter feindlicher Besatzung. Befestigte Orte werden fünfmal stärker gewichtet."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "Gleicht die Strafen für die Festungsverteidigung in der Hauptstadt teilweise aus. Die Hauptstadt widersteht der Hälfte der [noicthy_war_momentum|E]-Strafe."
 game_concept_noicthy_war_momentum:0 "Kriegsdynamik"
 game_concept_noicthy_war_momentum_desc:0 "Wenn die [noicthy_war_momentum_army_exhaustion|E] schwindet, steigt die Kriegsmüdigkeit und Festungen werden leichter zu belagern. Das [noicthy_war_momentum_occupation|E] verstärkt beide Effekte. Der [noicthy_war_momentum_diplomatic_pressure|E] kann den Verfall je nach Engagement der Verbündeten beschleunigen oder verlangsamen. Die [noicthy_war_momentum_capital|E] bietet teilweisen Schutz, aber wenn die Hauptstadt fällt, schlägt [noicthy_war_momentum_capital_fallen|E] zu."
 game_concept_noicthy_war_momentum_army:0 "Militärische Stärke"
 game_concept_noicthy_war_momentum_army_desc:0 "Die Festungsverteidigung wird basierend darauf verringert, wie viel militärische Stärke seit dem Höchststand im Krieg verloren wurde. Untertanen, die an der Seite ihres Oberherrn kämpfen, kombinieren ihre militärische Stärke, sodass ein Pufferstaat, der von einem starken Oberherrn unterstützt wird, seine Festungen intakt hält."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "Militärische Stärke"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "Die Kriegsmüdigkeit steigt basierend darauf, wie viel der militärischen Stärke eines Landes erschöpft wurde. Die militärische Stärke ist die kombinierte Kampfkraft aller eingesetzten Streitkräfte plus Mannstärkereserven. Mannstärke zählt nur bis zum Vierfachen der regulären Armeekapazität eines Landes, was die praktischen Grenzen der Verstärkung widerspiegelt. Das Einberufen oder Entlassen von Aufgeboten ändert sie nicht, nur tatsächliche Verluste, Auffüllung und neue Rekrutierung zählen."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "Diplomatischer Druck"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "[subjects|e] mit eingeschränkter Diplomatie und [coalition|e]-Partner, die nicht eigenständig Frieden verhandeln können, üben politischen Einfluss auf den Kriegsführer aus. Wenn ihre [war_exhaustion|e] über 5 steigt, drängen sie den Anführer, den Konflikt zu beenden. Koalitionsmitglieder, die noch frisch sind (unter 5 Kriegsmüdigkeit), stärken tatsächlich die Position des Anführers und verringern die Kriegsmüdigkeit. Der Einfluss jedes Partners wird nach seiner wirtschaftlichen Bedeutung im Verhältnis zum Anführer gewichtet."
 game_concept_noicthy_war_momentum_occupation:0 "Besetztes Heimatgebiet"
 game_concept_noicthy_war_momentum_occupation_desc:0 "Die Festungsverteidigung wird verringert und die Kriegsmüdigkeit steigt basierend darauf, wie viel des Territoriums eines Landes unter feindlicher Besatzung steht. Orte mit Festungen zählen fünfmal so stark. Territorium, das von Nationen mit automatischen Eroberungsfähigkeiten erobert wurde, zählt für den Verteidiger auch nach dem Besitzerwechsel weiterhin als Besatzung."
 game_concept_noicthy_war_momentum_capital:0 "Widerstandskraft der Hauptstadt"
 game_concept_noicthy_war_momentum_capital_desc:0 "Die Hauptstadt widersteht der Hälfte der [noicthy_war_momentum|E]-Strafe auf die Festungsverteidigung und repräsentiert die konzentrierte Verteidigung des Regierungssitzes."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "Die Hauptstadt ist in feindliche Hand gefallen, was die gesamte Nation demoralisiert und ihre verbleibenden Verteidigungen schwächt."
 game_concept_noicthy_war_momentum_capital_fallen:0 "Hauptstadt gefallen"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "Wenn die Hauptstadt unter feindlicher Besatzung steht, erleiden alle Festungen der Nation eine verringerte Verteidigung. Der Regierungssitz ist gefallen, niemand kommt zu Hilfe."
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
