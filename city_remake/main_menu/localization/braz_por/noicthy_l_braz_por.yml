l_braz_por:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "Reduz a defesa dos fortes com base em quanto da força militar de um país foi esgotada desde o pico em tempos de guerra."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "Aumenta a exaustão de guerra com base em quanto da força militar de um país foi esgotada. O poder de combate do exército e a reserva de contingente contribuem igualmente."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "A exaustão de guerra é influenciada pelas atitudes de súditos e parceiros de coalizão. Aliados cansados da guerra exercem pressão, enquanto membros comprometidos da coalizão com baixa exaustão de guerra reforçam a determinação do líder de guerra."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "Reduz a defesa dos fortes e aumenta a exaustão de guerra com base na proporção de território sob ocupação inimiga. Locais fortificados têm peso cinco vezes maior."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "Compensa parcialmente as penalidades de defesa dos fortes na capital. A capital resiste a metade da penalidade de [noicthy_war_momentum|E]."
 game_concept_noicthy_war_momentum:0 "Impulso de Guerra"
 game_concept_noicthy_war_momentum_desc:0 "À medida que a [noicthy_war_momentum_army_exhaustion|E] se esgota, a exaustão de guerra aumenta e os fortes se tornam mais fáceis de sitiar. O [noicthy_war_momentum_occupation|E] amplifica ambos os efeitos. A [noicthy_war_momentum_diplomatic_pressure|E] pode acelerar ou desacelerar o declínio dependendo do comprometimento aliado. A [noicthy_war_momentum_capital|E] oferece proteção parcial, mas se a capital cair, [noicthy_war_momentum_capital_fallen|E] entra em ação."
 game_concept_noicthy_war_momentum_army:0 "Força Militar"
 game_concept_noicthy_war_momentum_army_desc:0 "A defesa dos fortes é reduzida com base em quanto da força militar foi esgotada desde o pico em tempos de guerra. Súditos lutando ao lado de seu suserano combinam a força militar, de modo que um estado tampão apoiado por um suserano forte mantém seus fortes intactos."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "Força Militar"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "A exaustão de guerra aumenta com base em quanto da força militar de um país foi esgotada. A força militar é o poder de combate combinado de todas as forças em campo mais a reserva de contingente. O contingente só conta até quatro vezes a capacidade do exército regular de um país, refletindo os limites práticos de reforço. Convocar ou dispensar conscritos não a altera, apenas perdas reais, reposição e novo recrutamento contam."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "Pressão Diplomática"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "[subjects|e] com diplomacia limitada e parceiros de [coalition|e] que não podem negociar a paz por conta própria exercem influência política sobre o líder de guerra. Quando sua [war_exhaustion|e] ultrapassa 5, eles pressionam o líder a encerrar o conflito. Membros da coalizão que ainda estão descansados (abaixo de 5 de exaustão de guerra) na verdade fortalecem a posição do líder, reduzindo a exaustão de guerra. A influência de cada parceiro é ponderada por sua importância econômica em relação ao líder."
 game_concept_noicthy_war_momentum_occupation:0 "Território Nacional Ocupado"
 game_concept_noicthy_war_momentum_occupation_desc:0 "A defesa dos fortes é reduzida e a exaustão de guerra aumenta com base em quanto do território de um país está sob ocupação inimiga. Locais com fortes contam cinco vezes mais. Território tomado por nações com capacidades de conquista automática ainda conta como ocupação para o defensor mesmo após a transferência de propriedade."
 game_concept_noicthy_war_momentum_capital:0 "Resiliência da Capital"
 game_concept_noicthy_war_momentum_capital_desc:0 "A capital resiste a metade da penalidade de [noicthy_war_momentum|E] na defesa dos fortes, representando a defesa concentrada da sede do poder."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "A capital caiu nas mãos do inimigo, desmoralizando toda a nação e enfraquecendo suas defesas restantes."
 game_concept_noicthy_war_momentum_capital_fallen:0 "Queda da Capital"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "Quando a capital está sob ocupação inimiga, todos os fortes da nação sofrem redução na defesa. A sede do poder caiu, ninguém virá ajudar."
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
 NOICTHY_POTENTIAL_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_FORT_TOTAL_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_HEADER:0 "[noicthy_war_momentum_occupation|E]"
 NOICTHY_OCCUPATION_FORTS:0 "[noicthy_fortified_locations|E]"
 NOICTHY_OCCUPATION_LOCATIONS:0 "[noicthy_unfortified_locations|E]"
 NOICTHY_OCCUPATION_DEFENSE_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_EXHAUSTION_LABEL:0 "Exaustão de Guerra"
 NOICTHY_CAPITAL_FALLEN_HEADER:0 "[noicthy_war_momentum_capital_fallen|E]"
 NOICTHY_CAPITAL_RESILIENCE_HEADER:0 "[noicthy_war_momentum_capital|E]"
 NOICTHY_PRESSURE_BREAKDOWN_HEADER:0 "Fontes de [noicthy_war_momentum_diplomatic_pressure|E]"
 NOICTHY_PRESSURE_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_CW_CROWN_FORTS:0 "Locais fortificados da [noicthy_civil_war_crown|E]"
 NOICTHY_CW_CROWN_LOCS:0 "Locais não fortificados da [noicthy_civil_war_crown|E]"
 NOICTHY_CW_PRETENDER_FORTS:0 "Locais fortificados do [noicthy_civil_war_pretender|E]"
 NOICTHY_CW_PRETENDER_LOCS:0 "Locais não fortificados do [noicthy_civil_war_pretender|E]"
 game_concept_noicthy_civil_war_crown:0 "Coroa"
 game_concept_noicthy_civil_war_crown_desc:0 "Território controlado pelo governo vigente durante uma guerra civil. O lado que controla mais território ponderado (locais fortificados contam cinco vezes mais) obtém a vantagem. Se a coroa controla menos que o pretendente, penalidades de ocupação são aplicadas."
 game_concept_noicthy_civil_war_pretender:0 "Pretendente"
 game_concept_noicthy_civil_war_pretender_desc:0 "Território controlado pela facção rebelde durante uma guerra civil. O lado que controla mais território ponderado (locais fortificados contam cinco vezes mais) obtém a vantagem. Se o pretendente controla mais que a coroa, a coroa sofre penalidades de ocupação."
