l_english:
 pie_court_expense_building: "Court Expenses"
 pie_court_expense_building_desc: "Court expenses are automatically converted into levels of this capital building. It represents the real goods consumed by the royal household, court ritual, chancery work, feasts, and gifts."
 pie_diplomatic_expense_building: "Diplomatic Expenses"
 pie_diplomatic_expense_building_desc: "Diplomatic expenses are automatically converted into levels of this capital building. It represents the real goods consumed by envoys, couriers, state papers, diplomatic gifts, and receptions."
 pie_stability_expense_building: "Stability Expenses"
 pie_stability_expense_building_desc: "Stability expenses are automatically converted into levels of this capital building. It represents the real goods consumed by relief, administration, public order, and local pacification."

 pie_court_expense_household: "Court Household and Regalia"
 pie_court_expense_household_desc: "The court maintains furnishings, ceremonial clothing, jewelry, and precious-metal gifts."
 pie_court_expense_chancery: "Court Chancery and Ritual"
 pie_court_expense_chancery_desc: "The court needs paper, books, beeswax, and incense for records, ceremonies, and daily ritual."
 pie_court_expense_feasts: "Court Feasts"
 pie_court_expense_feasts_desc: "Court feasts consume meat, fish, fruit, sugar, and wine."
 pie_court_expense_feasts_no_alcohol: "Alcohol-Free Court Feasts"
 pie_court_expense_feasts_no_alcohol_desc: "Religious custom prevents wine consumption, so court feasts rely more heavily on meat, fish, fruit, and sugar."

 pie_diplomatic_expense_chancery: "Diplomatic Chancery and Couriers"
 pie_diplomatic_expense_chancery_desc: "Diplomacy requires state papers, archives, messengers, horses, and cloth supplies."
 pie_diplomatic_expense_gifts: "State Gifts"
 pie_diplomatic_expense_gifts_desc: "Diplomatic gifts favor fine cloth, jewelry, porcelain, lacquerware, and precious metals."
 pie_diplomatic_expense_receptions: "Diplomatic Receptions"
 pie_diplomatic_expense_receptions_desc: "Diplomatic receptions consume food, sugar, wine, and furnishings."
 pie_diplomatic_expense_receptions_no_alcohol: "Alcohol-Free Diplomatic Receptions"
 pie_diplomatic_expense_receptions_no_alcohol_desc: "Religious custom prevents wine consumption, so receptions rely more heavily on food, sugar, and furnishings."

 pie_stability_expense_relief: "Relief Granaries"
 pie_stability_expense_relief_desc: "Keeping the realm stable requires staple grain, legumes, and some livestock for relief, compensation, and famine response."
 pie_stability_expense_administration: "Administrative Records"
 pie_stability_expense_administration_desc: "Stable governance needs paper, books, cloth, and beeswax for proclamations, registers, and local administration."
 pie_stability_expense_order_pre_gunpowder: "Traditional Order Keeping"
 pie_stability_expense_order_pre_gunpowder_desc: "Early public order relies on weapons and horses."
 pie_stability_expense_order_early_gunpowder: "Cannon-Supported Order Keeping"
 pie_stability_expense_order_early_gunpowder_desc: "After the Renaissance, cannons begin to support rebellion suppression and public order."
 pie_stability_expense_order_gunpowder: "Gunpowder Order Keeping"
 pie_stability_expense_order_gunpowder_desc: "In the gunpowder age, public order relies more on firearms, horses, and cannons."
