l_english:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "Reduces fort defensiveness based on how much of a country's military strength has been depleted from its wartime peak."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "Increases war exhaustion based on how much of a country's military strength has been depleted. Army combat power and manpower reserves both contribute."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "War exhaustion is influenced by the attitudes of subjects and coalition partners. War weary allies add pressure while committed coalition members with low war exhaustion bolster the war leader's resolve."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "Reduces fort defensiveness and increases war exhaustion based on the proportion of territory under enemy occupation. Fortified locations are weighted five times more heavily."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "Partially offsets fort defensiveness penalties at the capital. The capital resists half of the [noicthy_war_momentum|E] penalty."
 game_concept_noicthy_war_momentum:0 "War Momentum"
 game_concept_noicthy_war_momentum_desc:0 "As [noicthy_war_momentum_army_exhaustion|E] is depleted, war exhaustion rises and forts become easier to siege. [noicthy_war_momentum_occupation|E] amplifies both effects. [noicthy_war_momentum_diplomatic_pressure|E] can accelerate or slow the decline depending on allied commitment. [noicthy_war_momentum_capital|E] provides partial protection, but if the capital falls, [noicthy_war_momentum_capital_fallen|E] strikes."
 game_concept_noicthy_war_momentum_army:0 "Military Strength"
 game_concept_noicthy_war_momentum_army_desc:0 "Fort defensiveness is reduced based on how much military strength has been depleted from its wartime peak. Subjects fighting alongside their overlord combine military strength, so a buffer state backed by a strong overlord keeps its forts intact."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "Military Strength"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "War exhaustion rises based on how much of a country's military strength has been depleted. Military strength is the combined combat power of all fielded forces plus manpower reserves. Manpower only counts up to four times a country's regular army capacity, reflecting the practical limits of reinforcement. Raising or dismissing levies does not change it, only actual losses, replenishment, and new recruitment do."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "Diplomatic Pressure"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "[subjects|e] with limited diplomacy and [coalition|e] partners who cannot negotiate peace on their own exert political influence on the war leader. As their [war_exhaustion|e] rises above 5, they pressure the leader to end the conflict. Coalition members who are still fresh (below 5 war exhaustion) actually strengthen the leader's position, reducing war exhaustion. Each partner's influence is weighted by their economic significance relative to the leader."
 game_concept_noicthy_war_momentum_occupation:0 "Occupied Home Territory"
 game_concept_noicthy_war_momentum_occupation_desc:0 "Fort defensiveness is reduced and war exhaustion rises based on how much of a country's territory is under enemy occupation. Locations with forts count five times more heavily. Territory seized by nations with auto conquest abilities still counts as occupation for the defender even after ownership transfers."
 game_concept_noicthy_war_momentum_capital:0 "Capital Resilience"
 game_concept_noicthy_war_momentum_capital_desc:0 "The capital resists half of the [noicthy_war_momentum|E] penalty to fort defensiveness, representing the concentrated defense of the seat of power."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "The capital has fallen to enemy occupation, demoralizing the entire nation and weakening its remaining defenses."
 game_concept_noicthy_war_momentum_capital_fallen:0 "Capital Fallen"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "When the capital is under enemy occupation, all forts across the nation suffer reduced defensiveness. The seat of power has fallen, no one is coming to help."
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
 NOICTHY_POTENTIAL_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_FORT_TOTAL_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_HEADER:0 "[noicthy_war_momentum_occupation|E]"
 NOICTHY_OCCUPATION_FORTS:0 "[noicthy_fortified_locations|E]"
 NOICTHY_OCCUPATION_LOCATIONS:0 "[noicthy_unfortified_locations|E]"
 game_concept_noicthy_fortified_locations:0 "Fortified Locations (5x weight)"
 game_concept_noicthy_fortified_locations_desc:0 "Locations with forts that are occupied or conquered by enemies during the current war. Each fortified location counts five times more heavily than an unfortified one when calculating occupation penalties. This reflects the strategic importance of losing a fortified position. Includes both occupied locations (controlled by the enemy) and locations conquered through auto conquest during the war."
 game_concept_noicthy_unfortified_locations:0 "Unfortified Locations"
 game_concept_noicthy_unfortified_locations_desc:0 "Locations without forts that are occupied or conquered by enemies during the current war. Each unfortified location contributes to occupation penalties at base weight. While individually less impactful than fortified locations, losing many unfortified locations still accumulates significant penalties. Includes both occupied locations (controlled by the enemy) and locations conquered through auto conquest during the war."
 NOICTHY_OCCUPATION_DEFENSE_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_EXHAUSTION_LABEL:0 "War Exhaustion"
 NOICTHY_CAPITAL_FALLEN_HEADER:0 "[noicthy_war_momentum_capital_fallen|E]"
 NOICTHY_CAPITAL_RESILIENCE_HEADER:0 "[noicthy_war_momentum_capital|E]"
 NOICTHY_PRESSURE_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_diplomatic_pressure|E] Sources"
 NOICTHY_PRESSURE_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_CW_CROWN_FORTS:0 "Fortified [noicthy_civil_war_crown|E] Locations"
 NOICTHY_CW_CROWN_LOCS:0 "Unfortified [noicthy_civil_war_crown|E] Locations"
 NOICTHY_CW_PRETENDER_FORTS:0 "Fortified [noicthy_civil_war_pretender|E] Locations"
 NOICTHY_CW_PRETENDER_LOCS:0 "Unfortified [noicthy_civil_war_pretender|E] Locations"
 game_concept_noicthy_civil_war_crown:0 "Crown"
 game_concept_noicthy_civil_war_crown_desc:0 "Territory held by the ruling government during a civil war. The side holding more weighted territory (fortified locations count five times more) gains the advantage. If the crown holds less than the pretender, occupation penalties apply."
 game_concept_noicthy_civil_war_pretender:0 "Pretender"
 game_concept_noicthy_civil_war_pretender_desc:0 "Territory held by the rebel faction during a civil war. The side holding more weighted territory (fortified locations count five times more) gains the advantage. If the pretender holds more than the crown, the crown suffers occupation penalties."
