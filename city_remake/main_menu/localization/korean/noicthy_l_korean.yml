l_korean:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "전시 최고치 대비 군사력이 얼마나 소실되었는지에 따라 요새 방어력을 감소시킵니다."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "국가의 군사력이 얼마나 소진되었는지에 따라 전쟁 피로도를 증가시킵니다. 군의 전투력과 인력 비축량이 모두 기여합니다."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "전쟁 피로도는 신하와 연합 동반자의 태도에 영향을 받습니다. 전쟁에 지친 동맹국은 압력을 가하는 반면, 전쟁 피로도가 낮은 헌신적인 연합 구성원은 전쟁 지도자의 결의를 강화합니다."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "적에게 점령된 영토 비율에 따라 요새 방어력을 감소시키고 전쟁 피로도를 증가시킵니다. 요새화된 지역은 5배의 가중치를 받습니다."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "수도의 요새 방어력 불이익을 부분적으로 상쇄합니다. 수도는 [noicthy_war_momentum|E] 불이익의 절반에 저항합니다."
 game_concept_noicthy_war_momentum:0 "전쟁 기세"
 game_concept_noicthy_war_momentum_desc:0 "[noicthy_war_momentum_army_exhaustion|E]이 소진됨에 따라 전쟁 피로도가 상승하고 요새 공략이 쉬워집니다. [noicthy_war_momentum_occupation|E]은 두 가지 효과를 모두 증폭시킵니다. [noicthy_war_momentum_diplomatic_pressure|E]은 동맹의 헌신도에 따라 쇠퇴를 가속하거나 늦출 수 있습니다. [noicthy_war_momentum_capital|E]은 부분적 보호를 제공하지만, 수도가 함락되면 [noicthy_war_momentum_capital_fallen|E]이 발동합니다."
 game_concept_noicthy_war_momentum_army:0 "군사력"
 game_concept_noicthy_war_momentum_army_desc:0 "전시 최고치 대비 군사력이 얼마나 소실되었는지에 따라 요새 방어력이 감소합니다. 종주와 함께 싸우는 신하는 군사력을 합산하므로, 강력한 종주의 지원을 받는 완충국은 요새를 온전히 유지합니다."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "군사력"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "국가의 군사력이 얼마나 소진되었는지에 따라 전쟁 피로도가 상승합니다. 군사력은 모든 전개된 병력의 총 전투력과 인력 비축량의 합입니다. 인력은 국가 정규군 수용량의 4배까지만 산입되며, 이는 증원의 실질적 한계를 반영합니다. 징집군의 소집이나 해산은 이에 영향을 미치지 않으며, 실제 손실, 보충, 신규 징병만이 반영됩니다."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "외교적 압력"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "외교력이 제한된 [subjects|e]와 독자적으로 평화 협상을 할 수 없는 [coalition|e] 동반자는 전쟁 지도자에게 정치적 영향력을 행사합니다. 그들의 [war_exhaustion|e]이 5를 넘으면 분쟁 종결을 위해 지도자에게 압력을 가합니다. 아직 여력이 있는 연합 구성원(전쟁 피로도 5 미만)은 오히려 지도자의 입지를 강화하여 전쟁 피로도를 감소시킵니다. 각 동반자의 영향력은 지도자 대비 경제적 중요도에 따라 가중됩니다."
 game_concept_noicthy_war_momentum_occupation:0 "점령된 본토"
 game_concept_noicthy_war_momentum_occupation_desc:0 "국가 영토가 얼마나 적에게 점령되었는지에 따라 요새 방어력이 감소하고 전쟁 피로도가 상승합니다. 요새가 있는 지역은 5배의 가중치를 받습니다. 자동 정복 능력을 가진 국가가 점령한 영토는 소유권 이전 후에도 방어 측에게 여전히 점령으로 산입됩니다."
 game_concept_noicthy_war_momentum_capital:0 "수도의 저항력"
 game_concept_noicthy_war_momentum_capital_desc:0 "수도는 요새 방어력에 대한 [noicthy_war_momentum|E] 불이익의 절반에 저항하며, 이는 권력 중심부의 집중된 방어를 나타냅니다."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "수도가 적의 점령 하에 놓여 온 국가의 사기를 떨어뜨리고 남은 방어력을 약화시키고 있습니다."
 game_concept_noicthy_war_momentum_capital_fallen:0 "수도 함락"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "수도가 적의 점령 하에 있을 때, 국가 전역의 모든 요새는 방어력이 감소합니다. 권력의 중심부가 함락되었습니다. 아무도 도우러 오지 않을 것입니다."
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
