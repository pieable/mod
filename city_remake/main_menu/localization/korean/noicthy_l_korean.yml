 NOICTHY_OCCUPATION_EXHAUSTION_LABEL:0 "전쟁 피로도"
 NOICTHY_CAPITAL_FALLEN_HEADER:0 "[noicthy_war_momentum_capital_fallen|E]"
 NOICTHY_CAPITAL_RESILIENCE_HEADER:0 "[noicthy_war_momentum_capital|E]"
 NOICTHY_PRESSURE_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_diplomatic_pressure|E] 원천"
 NOICTHY_PRESSURE_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_CW_CROWN_FORTS:0 "[noicthy_civil_war_crown|E] 요새 지역"
 NOICTHY_CW_CROWN_LOCS:0 "[noicthy_civil_war_crown|E] 비요새 지역"
 NOICTHY_CW_PRETENDER_FORTS:0 "[noicthy_civil_war_pretender|E] 요새 지역"
 NOICTHY_CW_PRETENDER_LOCS:0 "[noicthy_civil_war_pretender|E] 비요새 지역"
 game_concept_noicthy_civil_war_crown:0 "왕관파"
 game_concept_noicthy_civil_war_crown_desc:0 "내전 중 집권 정부가 보유한 영토. 더 많은 가중 영토를 지배하는 측(요새 지역은 5배 가중)이 우위를 점합니다. 왕관파가 참칭자보다 적게 보유하면 점령 불이익이 적용됩니다."
 game_concept_noicthy_civil_war_pretender:0 "참칭자"
 game_concept_noicthy_civil_war_pretender_desc:0 "내전 중 반란 세력이 보유한 영토. 더 많은 가중 영토를 지배하는 측(요새 지역은 5배 가중)이 우위를 점합니다. 참칭자가 왕관파보다 많이 보유하면 왕관파에 점령 불이익이 적용됩니다."
