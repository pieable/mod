l_simp_chinese:
 pie_court_expense_building: "宫廷开支"
 pie_court_expense_building_desc: "宫廷开支会在首都自动转化为这个建筑的等级。它代表君主家政、宫廷礼仪、文书系统、宴饮和赏赐带来的真实商品消耗。"
 pie_diplomatic_expense_building: "外交开支"
 pie_diplomatic_expense_building_desc: "外交开支会在首都自动转化为这个建筑的等级。它代表使节、驿传、国书、国礼和外交接待带来的真实商品消耗。"
 pie_stability_expense_building: "稳定度开支"
 pie_stability_expense_building_desc: "稳定度开支会在首都自动转化为这个建筑的等级。它代表赈济、行政文书、公共秩序和地方安抚带来的真实商品消耗。"

 pie_court_expense_household: "宫廷家政与礼服"
 pie_court_expense_household_desc: "宫廷维持华丽陈设、礼服、珠宝和贵金属赏赐。"
 pie_court_expense_chancery: "宫廷文书与仪式"
 pie_court_expense_chancery_desc: "宫廷需要纸张、书籍、蜂蜡和香料维持文书、典礼和日常仪式。"
 pie_court_expense_feasts: "宫廷宴饮"
 pie_court_expense_feasts_desc: "宫廷宴饮消耗肉类、鱼、果品、糖和葡萄酒。"
 pie_court_expense_feasts_no_alcohol: "无酒宫廷宴饮"
 pie_court_expense_feasts_no_alcohol_desc: "受宗教习俗影响，宫廷宴饮不消耗酒类，而更多依赖肉类、鱼、果品和糖。"

 pie_diplomatic_expense_chancery: "外交文书与驿传"
 pie_diplomatic_expense_chancery_desc: "外交体系需要国书、档案、信使、驿马和随行布料补给。"
 pie_diplomatic_expense_gifts: "国礼与赏赐"
 pie_diplomatic_expense_gifts_desc: "外交赠礼偏向高级织物、珠宝、瓷器、漆器和贵金属。"
 pie_diplomatic_expense_receptions: "外交接待"
 pie_diplomatic_expense_receptions_desc: "外交接待消耗食物、糖、葡萄酒和会场陈设。"
 pie_diplomatic_expense_receptions_no_alcohol: "无酒外交接待"
 pie_diplomatic_expense_receptions_no_alcohol_desc: "受宗教习俗影响，外交接待不消耗酒类，而更多依赖食物、糖和陈设。"

 pie_stability_expense_relief: "赈济粮储"
 pie_stability_expense_relief_desc: "稳定国家需要常备的粮食、豆类和少量牲畜，用于赈济、抚恤和救荒。"
 pie_stability_expense_administration: "治理文书"
 pie_stability_expense_administration_desc: "稳定治理需要纸张、书籍、布料和蜂蜡维持公告、簿册和地方行政。"
 pie_stability_expense_order_pre_gunpowder: "传统治安力量"
 pie_stability_expense_order_pre_gunpowder_desc: "早期秩序维护依靠兵器和马匹。"
 pie_stability_expense_order_early_gunpowder: "火炮辅助治安"
 pie_stability_expense_order_early_gunpowder_desc: "文艺复兴后，火炮开始成为镇压叛乱和维持秩序的辅助工具。"
 pie_stability_expense_order_gunpowder: "火器治安力量"
 pie_stability_expense_order_gunpowder_desc: "火器时代的公共秩序更依赖火枪、马匹和火炮。"
