l_simp_chinese:
 pie_noble_manor_town: "庄园府"
 pie_noble_manor_town_desc: "由地方贵族出资建立的领主中心。它不直接提供邻近度，而是通过乡绅网络、征召能力与贵族定居，强化这一集镇的军事与社会支配力。"

 pie_noble_frontier_town: "边境庄园"
 pie_noble_frontier_town_desc: "由边境贵族出资建立的拓殖据点。它不再主打征召与宫廷，而是通过拓垦土地、压制边患和强化地方贵族权势，把偏远乡地逐步拉进贵族秩序。"

 pie_noble_court_city: "贵族宫廷"
 pie_noble_court_city_desc: "这座城市由贵族集团扶植起来，既是上层社会的居所，也是区域武备、礼仪和文化影响的中心。它会按每 1,000 人口扩充当地可容纳的贵族岗位。"

 pie_noble_urban.1.title: "贵族提议建立集镇"
 pie_noble_urban.1.desc: "本地控制稳固、人口和繁荣已达到一定水平。我国贵族准备在[target_location.GetName]出资建立一座集镇，并在当地兴建庄园府。"
 pie_noble_urban.1.a: "批准建立集镇"
 pie_noble_urban.1.a.tt: "#Y [target_location.GetNameWithNoTooltip]#!将升为#Y 集镇#!并开始建造#Y 庄园府#!，贵族阶层将立刻支付#Y 700#!杜卡特。"
 pie_noble_urban.1.b: "拒绝提议"
 pie_noble_urban.1.b.tt: "拒绝后，#Y 贵族阶层#!满意度将降低#R 10%#!。"

 pie_noble_urban.2.title: "贵族提议扩建城市"
 pie_noble_urban.2.desc: "本地控制十分稳固，人口与繁荣都已足以支撑更高层级的定居点。我国贵族准备在[target_location.GetName]推动城市化，并建立一座贵族宫廷。"
 pie_noble_urban.2.a: "批准扩建城市"
 pie_noble_urban.2.a.tt: "#Y [target_location.GetNameWithNoTooltip]#!将升为#Y 城市#!并开始建造#Y 贵族宫廷#!，贵族阶层将立刻支付#Y 2200#!杜卡特。"
 pie_noble_urban.2.b: "拒绝提议"
 pie_noble_urban.2.b.tt: "拒绝后，#Y 贵族阶层#!满意度将降低#R 10%#!。"

 pie_noble_urban.3.title: "边境贵族提议建立集镇"
 pie_noble_urban.3.desc: "[target_location.GetName]仍是一处控制薄弱的乡村地块，但当地税基已经足以支撑一处真正的边境贵族据点。我国贵族准备在这里建立一座集镇，并兴建边境庄园。"
 pie_noble_urban.3.a: "批准建立边境集镇"
 pie_noble_urban.3.a.tt: "#Y [target_location.GetNameWithNoTooltip]#!将升为#Y 集镇#!并开始建造#Y 边境庄园#!，贵族阶层将立刻支付#Y 700#!杜卡特。"
 pie_noble_urban.3.b: "拒绝提议"
 pie_noble_urban.3.b.tt: "拒绝后，#Y 贵族阶层#!满意度将降低#R 10%#!。"

 pie_noble_urban.11.title: "贵族提议资助既有集镇"
 pie_noble_urban.11.desc: "[target_location.GetName]虽然早已是一座集镇，但当地贵族尚未在这里建立自己的权力中心。如今他们愿意出资兴建庄园府。"
 pie_noble_urban.11.a: "批准兴建庄园府"
 pie_noble_urban.11.a.tt: "#Y [target_location.GetNameWithNoTooltip]#!将开始建造#Y 庄园府#!，贵族阶层将立刻支付#Y 700#!杜卡特。"
 pie_noble_urban.11.b: "拒绝提议"
 pie_noble_urban.11.b.tt: "拒绝后，#Y 贵族阶层#!满意度将降低#R 10%#!。"

 pie_noble_urban.12.title: "贵族提议资助既有城市"
 pie_noble_urban.12.desc: "[target_location.GetName]已经是一座成熟的城市，但当地贵族仍缺乏与之相称的宫廷和权力象征。如今他们愿意出资建立贵族宫廷。"
 pie_noble_urban.12.a: "批准兴建贵族宫廷"
 pie_noble_urban.12.a.tt: "#Y [target_location.GetNameWithNoTooltip]#!将开始建造#Y 贵族宫廷#!，贵族阶层将立刻支付#Y 2200#!杜卡特。"
