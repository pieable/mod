 NOICTHY_CW_CROWN_FORTS:0 "[noicthy_civil_war_crown|E]要塞据点"
 NOICTHY_CW_CROWN_LOCS:0 "[noicthy_civil_war_crown|E]非要塞据点"
 NOICTHY_CW_PRETENDER_FORTS:0 "[noicthy_civil_war_pretender|E]要塞据点"
 NOICTHY_CW_PRETENDER_LOCS:0 "[noicthy_civil_war_pretender|E]非要塞据点"
 game_concept_noicthy_civil_war_crown:0 "王冠派"
 game_concept_noicthy_civil_war_crown_desc:0 "内战期间由执政政府控制的领土。控制更多加权领土的一方（要塞据点权重为五倍）获得优势。如果王冠派控制的领土少于僭越者，则适用占领惩罚。"
 game_concept_noicthy_civil_war_pretender:0 "僭越者"
 game_concept_noicthy_civil_war_pretender_desc:0 "内战期间由叛军派系控制的领土。控制更多加权领土的一方（要塞据点权重为五倍）获得优势。如果僭越者控制的领土多于王冠派，则王冠派遭受占领惩罚。"
