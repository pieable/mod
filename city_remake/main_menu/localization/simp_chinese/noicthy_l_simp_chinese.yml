l_simp_chinese:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "根据一国军事实力较战时峰值下降的程度，降低要塞防御。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "根据一国军事实力的消耗程度增加厌战度。军队战斗力和人力储备均有贡献。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "厌战度受到附庸和联盟伙伴态度的影响。厌战的盟友施加压力，而厌战度低的坚定联盟成员则会增强战争领袖的决心。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "根据被敌军占领的领土比例，降低要塞防御并增加厌战度。要塞据点的权重为五倍。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "部分抵消首都的要塞防御惩罚。首都可抵抗[noicthy_war_momentum|E]惩罚的一半。"
 game_concept_noicthy_war_momentum:0 "战争势头"
 game_concept_noicthy_war_momentum_desc:0 "随着[noicthy_war_momentum_army_exhaustion|E]的消耗，厌战度上升，要塞变得更容易攻陷。[noicthy_war_momentum_occupation|E]会放大这两种效果。[noicthy_war_momentum_diplomatic_pressure|E]可根据盟友的投入程度加速或减缓衰退。[noicthy_war_momentum_capital|E]提供部分保护，但若首都沦陷，[noicthy_war_momentum_capital_fallen|E]便会生效。"
 game_concept_noicthy_war_momentum_army:0 "军事实力"
 game_concept_noicthy_war_momentum_army_desc:0 "根据军事实力较战时峰值下降的程度，要塞防御降低。与宗主并肩作战的附庸会合计军事实力，因此受到强大宗主支持的缓冲国能保持其要塞完好。"
 game_concept_noicthy_war_momentum_army_exhaustion:0 "军事实力"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "厌战度随一国军事实力的消耗程度而上升。军事实力是所有已部署部队的总战斗力加上人力储备。人力仅计入一国正规军容量的四倍以内，反映了增援的实际限制。征召或遣散征召兵不会改变军事实力，只有实际损失、补充和新征兵才会产生影响。"
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "外交压力"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "外交能力有限的[subjects|e]和无法独自谈判和平的[coalition|e]伙伴会对战争领袖施加政治影响。当他们的[war_exhaustion|e]超过5时，他们会向领袖施压以结束冲突。仍有余力的联盟成员（厌战度低于5）实际上会加强领袖的地位，降低厌战度。每个伙伴的影响力按其相对于领袖的经济重要性加权。"
 game_concept_noicthy_war_momentum_occupation:0 "被占领土"
 game_concept_noicthy_war_momentum_occupation_desc:0 "根据一国被敌军占领的领土比例，要塞防御降低，厌战度上升。拥有要塞的据点权重为五倍。拥有自动征服能力的国家所夺取的领土，即使在所有权转移后，仍然被视为对防御方的占领。"
 game_concept_noicthy_war_momentum_capital:0 "首都坚韧"
 game_concept_noicthy_war_momentum_capital_desc:0 "首都可抵抗[noicthy_war_momentum|E]对要塞防御惩罚的一半，体现了权力中心的集中防御。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "首都已落入敌手，全国士气低落，剩余防御被削弱。"
 game_concept_noicthy_war_momentum_capital_fallen:0 "首都沦陷"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "当首都处于敌军占领之下时，全国所有要塞的防御降低。权力中心已经沦陷，不会有人来救援。"
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
