l_russian:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "Снижает оборону крепостей в зависимости от того, какая доля военной мощи страны была потеряна с пикового значения в ходе войны."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "Увеличивает усталость от войны в зависимости от того, какая доля военной мощи страны была истощена. Боевая мощь армии и резерв рекрутов вносят свой вклад."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "На усталость от войны влияет позиция вассалов и союзников по коалиции. Уставшие от войны союзники оказывают давление, тогда как преданные члены коалиции с низкой усталостью от войны укрепляют решимость военного лидера."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "Снижает оборону крепостей и увеличивает усталость от войны в зависимости от доли территории под вражеской оккупацией. Укреплённые позиции имеют пятикратный вес."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "Частично компенсирует штрафы к обороне крепостей в столице. Столица противостоит половине штрафа от [noicthy_war_momentum|E]."
 game_concept_noicthy_war_momentum:0 "Военная инерция"
 game_concept_noicthy_war_momentum_desc:0 "По мере истощения [noicthy_war_momentum_army_exhaustion|E] усталость от войны растёт и крепости становится легче осаждать. [noicthy_war_momentum_occupation|E] усиливает оба эффекта. [noicthy_war_momentum_diplomatic_pressure|E] может ускорить или замедлить упадок в зависимости от преданности союзников. [noicthy_war_momentum_capital|E] обеспечивает частичную защиту, но если столица падёт, наступает [noicthy_war_momentum_capital_fallen|E]."
 game_concept_noicthy_war_momentum_army:0 "Военная мощь"
 game_concept_noicthy_war_momentum_army_desc:0 "Оборона крепостей снижается в зависимости от того, какая доля военной мощи была потеряна с пикового значения в ходе войны. Вассалы, сражающиеся на стороне своего сюзерена, объединяют военную мощь, поэтому буферное государство при поддержке сильного сюзерена сохраняет свои крепости нетронутыми."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "Военная мощь"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "Усталость от войны растёт в зависимости от того, какая доля военной мощи страны была истощена. Военная мощь складывается из совокупной боевой силы всех развёрнутых войск и резерва рекрутов. Рекруты учитываются лишь в объёме до четырёхкратной численности регулярной армии страны, отражая практические пределы пополнения. Созыв или роспуск ополчений не влияет на неё, учитываются только реальные потери, восполнение и новый набор."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "Дипломатическое давление"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "[subjects|e] с ограниченной дипломатией и партнёры по [coalition|e], не способные вести мирные переговоры самостоятельно, оказывают политическое влияние на военного лидера. Когда их [war_exhaustion|e] превышает 5, они давят на лидера с целью прекращения конфликта. Члены коалиции, которые ещё бодры (ниже 5 усталости от войны), фактически укрепляют позицию лидера, снижая усталость от войны. Влияние каждого партнёра взвешивается по его экономической значимости относительно лидера."
 game_concept_noicthy_war_momentum_occupation:0 "Оккупированная территория"
 game_concept_noicthy_war_momentum_occupation_desc:0 "Оборона крепостей снижается и усталость от войны растёт в зависимости от того, какая доля территории страны находится под вражеской оккупацией. Позиции с крепостями считаются в пять раз весомее. Территория, захваченная нациями с возможностью автоматического завоевания, по-прежнему считается оккупацией для обороняющегося даже после перехода права собственности."
 game_concept_noicthy_war_momentum_capital:0 "Стойкость столицы"
 game_concept_noicthy_war_momentum_capital_desc:0 "Столица противостоит половине штрафа от [noicthy_war_momentum|E] к обороне крепостей, олицетворяя сосредоточенную защиту центра власти."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "Столица пала под натиском врага, деморализуя всю нацию и ослабляя оставшуюся оборону."
 game_concept_noicthy_war_momentum_capital_fallen:0 "Падение столицы"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "Когда столица находится под вражеской оккупацией, все крепости страны страдают от снижения обороны. Центр власти пал, помощь не придёт."
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
