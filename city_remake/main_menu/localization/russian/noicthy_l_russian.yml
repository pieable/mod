 NOICTHY_OCCUPATION_EXHAUSTION_LABEL:0 "Усталость от войны"
 NOICTHY_CAPITAL_FALLEN_HEADER:0 "[noicthy_war_momentum_capital_fallen|E]"
 NOICTHY_CAPITAL_RESILIENCE_HEADER:0 "[noicthy_war_momentum_capital|E]"
 NOICTHY_PRESSURE_BREAKDOWN_HEADER:0 "Источники [noicthy_war_momentum_diplomatic_pressure|E]"
 NOICTHY_PRESSURE_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_CW_CROWN_FORTS:0 "Укреплённые позиции [noicthy_civil_war_crown|E]"
 NOICTHY_CW_CROWN_LOCS:0 "Неукреплённые позиции [noicthy_civil_war_crown|E]"
 NOICTHY_CW_PRETENDER_FORTS:0 "Укреплённые позиции [noicthy_civil_war_pretender|E]"
 NOICTHY_CW_PRETENDER_LOCS:0 "Неукреплённые позиции [noicthy_civil_war_pretender|E]"
 game_concept_noicthy_civil_war_crown:0 "Корона"
 game_concept_noicthy_civil_war_crown_desc:0 "Территория, удерживаемая правящим правительством во время гражданской войны. Сторона, контролирующая больше взвешенной территории (укреплённые позиции считаются в пять раз весомее), получает преимущество. Если корона удерживает меньше, чем претендент, применяются штрафы за оккупацию."
 game_concept_noicthy_civil_war_pretender:0 "Претендент"
 game_concept_noicthy_civil_war_pretender_desc:0 "Территория, удерживаемая мятежной фракцией во время гражданской войны. Сторона, контролирующая больше взвешенной территории (укреплённые позиции считаются в пять раз весомее), получает преимущество. Если претендент удерживает больше, чем корона, корона страдает от штрафов за оккупацию."
