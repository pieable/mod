 game_concept_noicthy_civil_war_crown:0 "Taç"
 game_concept_noicthy_civil_war_crown_desc:0 "İç savaş sırasında yönetici hükümet tarafından tutulan topraklar. Daha fazla ağırlıklı toprağı kontrol eden taraf (müstahkem mevkiler beş kat daha fazla sayılır) avantaj elde eder. Taç, müddeinden daha az kontrol ediyorsa işgal cezaları uygulanır."
 game_concept_noicthy_civil_war_pretender:0 "Müddei"
 game_concept_noicthy_civil_war_pretender_desc:0 "İç savaş sırasında isyancı hizip tarafından tutulan topraklar. Daha fazla ağırlıklı toprağı kontrol eden taraf (müstahkem mevkiler beş kat daha fazla sayılır) avantaj elde eder. Müddei, taçtan daha fazla kontrol ediyorsa taç işgal cezalarına maruz kalır."
