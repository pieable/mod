l_turkish:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "Bir ülkenin askeri gücünün savaş dönemindeki zirvesinden ne kadar azaldığına bağlı olarak tahkimat savunmasını düşürür."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "Bir ülkenin askeri gücünün ne kadar tükendiğine bağlı olarak savaş yorgunluğunu artırır. Ordunun muharebe gücü ve insan gücü rezervlerinin her ikisi de katkıda bulunur."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "Savaş yorgunluğu, tabi devletlerin ve koalisyon ortaklarının tutumlarından etkilenir. Savaştan bıkmış müttefikler baskı uygularken, düşük savaş yorgunluğuna sahip kararlı koalisyon üyeleri savaş liderinin kararlılığını güçlendirir."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "Düşman işgali altındaki toprak oranına bağlı olarak tahkimat savunmasını düşürür ve savaş yorgunluğunu artırır. Müstahkem mevkiler beş kat daha ağır sayılır."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "Başkentteki tahkimat savunma cezalarını kısmen telafi eder. Başkent, [noicthy_war_momentum|E] cezasının yarısına direnir."
 game_concept_noicthy_war_momentum:0 "Savaş İvmesi"
 game_concept_noicthy_war_momentum_desc:0 "[noicthy_war_momentum_army_exhaustion|E] tükendikçe savaş yorgunluğu artar ve kaleler kuşatılması kolaylaşır. [noicthy_war_momentum_occupation|E] her iki etkiyi de güçlendirir. [noicthy_war_momentum_diplomatic_pressure|E] müttefik bağlılığına bağlı olarak düşüşü hızlandırabilir veya yavaşlatabilir. [noicthy_war_momentum_capital|E] kısmi koruma sağlar, ancak başkent düşerse [noicthy_war_momentum_capital_fallen|E] devreye girer."
 game_concept_noicthy_war_momentum_army:0 "Askeri Güç"
 game_concept_noicthy_war_momentum_army_desc:0 "Tahkimat savunması, askeri gücün savaş dönemindeki zirvesinden ne kadar azaldığına bağlı olarak düşürülür. Süzerenlerinin yanında savaşan tabi devletler askeri güçlerini birleştirir, bu nedenle güçlü bir süzeren tarafından desteklenen tampon devlet kalelerini sağlam tutar."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "Askeri Güç"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "Savaş yorgunluğu, bir ülkenin askeri gücünün ne kadar tükendiğine bağlı olarak artar. Askeri güç, sahaya sürülen tüm kuvvetlerin toplam muharebe gücü ile insan gücü rezervlerinin toplamıdır. İnsan gücü yalnızca bir ülkenin düzenli ordu kapasitesinin dört katına kadar sayılır, bu da takviyenin pratik sınırlarını yansıtır. Seferber çağırmak veya terhis etmek bunu değiştirmez, yalnızca gerçek kayıplar, ikmal ve yeni asker alma etkiler."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "Diplomatik Baskı"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "Sınırlı diplomasiye sahip [subjects|e] ve kendi başlarına barış müzakeresi yapamayan [coalition|e] ortakları, savaş lideri üzerinde siyasi etki uygular. [war_exhaustion|e] 5'in üzerine çıktığında, lidere çatışmayı sona erdirmesi için baskı yaparlar. Hâlâ dinç olan koalisyon üyeleri (5 savaş yorgunluğunun altında) aslında liderin konumunu güçlendirir ve savaş yorgunluğunu azaltır. Her ortağın etkisi, liderle karşılaştırıldığında ekonomik önemine göre ağırlıklandırılır."
 game_concept_noicthy_war_momentum_occupation:0 "İşgal Altındaki Topraklar"
 game_concept_noicthy_war_momentum_occupation_desc:0 "Bir ülkenin topraklarının ne kadarının düşman işgali altında olduğuna bağlı olarak tahkimat savunması düşer ve savaş yorgunluğu artar. Kaleli mevkiler beş kat daha ağır sayılır. Otomatik fetih yeteneklerine sahip milletler tarafından ele geçirilen topraklar, mülkiyet devri sonrasında bile savunucu için işgal olarak sayılmaya devam eder."
 game_concept_noicthy_war_momentum_capital:0 "Başkent Dayanıklılığı"
 game_concept_noicthy_war_momentum_capital_desc:0 "Başkent, tahkimat savunmasına uygulanan [noicthy_war_momentum|E] cezasının yarısına direnir ve iktidar merkezinin yoğunlaştırılmış savunmasını temsil eder."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "Başkent düşman işgaline düşmüş, tüm ulusu cesaretsizleştirmiş ve kalan savunmasını zayıflatmıştır."
 game_concept_noicthy_war_momentum_capital_fallen:0 "Başkent Düştü"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "Başkent düşman işgali altındayken, ülke genelindeki tüm kaleler düşük savunmadan muzdarip olur. İktidar merkezi düşmüştür, yardım gelmeyecektir."
