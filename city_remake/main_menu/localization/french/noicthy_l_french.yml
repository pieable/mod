l_french:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "Réduit la défense des forts selon la proportion de la force militaire perdue depuis le pic atteint en temps de guerre."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "Augmente la lassitude de guerre selon la proportion de la force militaire d'un pays qui a été épuisée. La puissance de combat des armées et les réserves contribuent toutes deux."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "La lassitude de guerre est influencée par les attitudes des sujets et des partenaires de coalition. Les alliés las de la guerre exercent une pression, tandis que les membres engagés de la coalition avec une faible lassitude de guerre renforcent la détermination du meneur de guerre."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "Réduit la défense des forts et augmente la lassitude de guerre selon la proportion du territoire sous occupation ennemie. Les emplacements fortifiés comptent cinq fois plus."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "Compense partiellement les pénalités de défense des forts dans la capitale. La capitale résiste à la moitié de la pénalité d'[noicthy_war_momentum|E]."
 game_concept_noicthy_war_momentum:0 "Élan de guerre"
 game_concept_noicthy_war_momentum_desc:0 "À mesure que la [noicthy_war_momentum_army_exhaustion|E] diminue, la lassitude de guerre augmente et les forts deviennent plus faciles à assiéger. Le [noicthy_war_momentum_occupation|E] amplifie les deux effets. La [noicthy_war_momentum_diplomatic_pressure|E] peut accélérer ou ralentir le déclin selon l'engagement des alliés. La [noicthy_war_momentum_capital|E] offre une protection partielle, mais si la capitale tombe, [noicthy_war_momentum_capital_fallen|E] frappe."
 game_concept_noicthy_war_momentum_army:0 "Force militaire"
 game_concept_noicthy_war_momentum_army_desc:0 "La défense des forts est réduite selon la proportion de force militaire perdue depuis le pic atteint en temps de guerre. Les sujets combattant aux côtés de leur suzerain combinent leur force militaire, de sorte qu'un État tampon soutenu par un suzerain puissant conserve l'intégrité de ses forts."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "Force militaire"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "La lassitude de guerre augmente selon la proportion de la force militaire d'un pays qui a été épuisée. La force militaire combine la puissance de combat de toutes les forces déployées et les réserves. Les réserves ne comptent que jusqu'à quatre fois la capacité de l'armée régulière d'un pays, reflétant les limites pratiques du renforcement. Lever ou licencier des levées ne la modifie pas, seules les pertes réelles, le réapprovisionnement et le nouveau recrutement comptent."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "Pression diplomatique"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "Les [subjects|e] à diplomatie limitée et les partenaires de [coalition|e] qui ne peuvent pas négocier la paix seuls exercent une influence politique sur le meneur de guerre. Lorsque leur [war_exhaustion|e] dépasse 5, ils font pression sur le meneur pour mettre fin au conflit. Les membres de la coalition encore frais (en dessous de 5 de lassitude de guerre) renforcent en réalité la position du meneur, réduisant la lassitude de guerre. L'influence de chaque partenaire est pondérée par son importance économique par rapport au meneur."
 game_concept_noicthy_war_momentum_occupation:0 "Territoire national occupé"
 game_concept_noicthy_war_momentum_occupation_desc:0 "La défense des forts est réduite et la lassitude de guerre augmente selon la proportion du territoire d'un pays sous occupation ennemie. Les emplacements dotés de forts comptent cinq fois plus. Le territoire saisi par des nations dotées de capacités de conquête automatique compte toujours comme occupation pour le défenseur même après le transfert de propriété."
 game_concept_noicthy_war_momentum_capital:0 "Résilience de la capitale"
 game_concept_noicthy_war_momentum_capital_desc:0 "La capitale résiste à la moitié de la pénalité d'[noicthy_war_momentum|E] sur la défense des forts, représentant la défense concentrée du siège du pouvoir."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "La capitale est tombée aux mains de l'ennemi, démoralisant la nation entière et affaiblissant ses défenses restantes."
 game_concept_noicthy_war_momentum_capital_fallen:0 "Chute de la capitale"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "Lorsque la capitale est sous occupation ennemie, tous les forts de la nation subissent une réduction de leur défense. Le siège du pouvoir est tombé, personne ne viendra aider."
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
 NOICTHY_POTENTIAL_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_FORT_TOTAL_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_HEADER:0 "[noicthy_war_momentum_occupation|E]"
 NOICTHY_OCCUPATION_FORTS:0 "[noicthy_fortified_locations|E]"
 NOICTHY_OCCUPATION_LOCATIONS:0 "[noicthy_unfortified_locations|E]"
 NOICTHY_OCCUPATION_DEFENSE_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_EXHAUSTION_LABEL:0 "Lassitude de guerre"
 NOICTHY_CAPITAL_FALLEN_HEADER:0 "[noicthy_war_momentum_capital_fallen|E]"
 NOICTHY_CAPITAL_RESILIENCE_HEADER:0 "[noicthy_war_momentum_capital|E]"
 NOICTHY_PRESSURE_BREAKDOWN_HEADER:0 "Sources de [noicthy_war_momentum_diplomatic_pressure|E]"
 NOICTHY_PRESSURE_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_CW_CROWN_FORTS:0 "Emplacements fortifiés de la [noicthy_civil_war_crown|E]"
 NOICTHY_CW_CROWN_LOCS:0 "Emplacements non fortifiés de la [noicthy_civil_war_crown|E]"
 NOICTHY_CW_PRETENDER_FORTS:0 "Emplacements fortifiés du [noicthy_civil_war_pretender|E]"
 NOICTHY_CW_PRETENDER_LOCS:0 "Emplacements non fortifiés du [noicthy_civil_war_pretender|E]"
 game_concept_noicthy_civil_war_crown:0 "Couronne"
 game_concept_noicthy_civil_war_crown_desc:0 "Territoire détenu par le gouvernement en place durant une guerre civile. Le camp contrôlant plus de territoire pondéré (les emplacements fortifiés comptent cinq fois plus) obtient l'avantage. Si la couronne détient moins que le prétendant, des pénalités d'occupation s'appliquent."
 game_concept_noicthy_civil_war_pretender:0 "Prétendant"
 game_concept_noicthy_civil_war_pretender_desc:0 "Territoire détenu par la faction rebelle durant une guerre civile. Le camp contrôlant plus de territoire pondéré (les emplacements fortifiés comptent cinq fois plus) obtient l'avantage. Si le prétendant détient plus que la couronne, la couronne subit des pénalités d'occupation."
