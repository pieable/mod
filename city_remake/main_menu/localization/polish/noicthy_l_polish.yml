 NOICTHY_CW_CROWN_FORTS:0 "Umocnione lokacje [noicthy_civil_war_crown|E]"
 NOICTHY_CW_CROWN_LOCS:0 "Nieumocnione lokacje [noicthy_civil_war_crown|E]"
 NOICTHY_CW_PRETENDER_FORTS:0 "Umocnione lokacje [noicthy_civil_war_pretender|E]"
 NOICTHY_CW_PRETENDER_LOCS:0 "Nieumocnione lokacje [noicthy_civil_war_pretender|E]"
 game_concept_noicthy_civil_war_crown:0 "Korona"
 game_concept_noicthy_civil_war_crown_desc:0 "Terytorium kontrolowane przez rządzący rząd podczas wojny domowej. Strona kontrolująca więcej ważonego terytorium (umocnione lokacje liczą się pięć razy więcej) zyskuje przewagę. Jeśli korona kontroluje mniej niż pretendent, obowiązują kary za okupację."
 game_concept_noicthy_civil_war_pretender:0 "Pretendent"
 game_concept_noicthy_civil_war_pretender_desc:0 "Terytorium kontrolowane przez frakcję rebeliantów podczas wojny domowej. Strona kontrolująca więcej ważonego terytorium (umocnione lokacje liczą się pięć razy więcej) zyskuje przewagę. Jeśli pretendent kontroluje więcej niż korona, korona ponosi kary za okupację."
