l_polish:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "Zmniejsza obronę fortów w zależności od tego, ile siły militarnej kraju zostało utracone od szczytowego poziomu w czasie wojny."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "Zwiększa wyczerpanie wojenne w zależności od tego, ile siły militarnej kraju zostało wyczerpane. Siła bojowa armii i rezerwa siły żywej mają wspólny wkład."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "Na wyczerpanie wojenne wpływają postawy poddanych i partnerów koalicji. Zmęczeni wojną sojusznicy wywierają presję, podczas gdy zaangażowani członkowie koalicji z niskim wyczerpaniem wojennym wzmacniają determinację przywódcy wojennego."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "Zmniejsza obronę fortów i zwiększa wyczerpanie wojenne w zależności od proporcji terytorium pod okupacją wroga. Umocnione lokacje mają pięciokrotnie większą wagę."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "Częściowo kompensuje kary do obrony fortów w stolicy. Stolica opiera się połowie kary z [noicthy_war_momentum|E]."
 game_concept_noicthy_war_momentum:0 "Impet wojenny"
 game_concept_noicthy_war_momentum_desc:0 "W miarę wyczerpywania [noicthy_war_momentum_army_exhaustion|E] wyczerpanie wojenne rośnie, a forty stają się łatwiejsze do oblężenia. [noicthy_war_momentum_occupation|E] wzmacnia oba efekty. [noicthy_war_momentum_diplomatic_pressure|E] może przyspieszyć lub spowolnić upadek w zależności od zaangażowania sojuszników. [noicthy_war_momentum_capital|E] zapewnia częściową ochronę, ale jeśli stolica upadnie, uderza [noicthy_war_momentum_capital_fallen|E]."
 game_concept_noicthy_war_momentum_army:0 "Siła militarna"
 game_concept_noicthy_war_momentum_army_desc:0 "Obrona fortów jest zmniejszana w zależności od tego, ile siły militarnej utracono od szczytowego poziomu w czasie wojny. Poddani walczący u boku swojego suzerena łączą siłę militarną, więc państwo buforowe wspierane przez silnego suzerena utrzymuje swoje forty nienaruszone."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "Siła militarna"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "Wyczerpanie wojenne rośnie w zależności od tego, ile siły militarnej kraju zostało wyczerpane. Siła militarna to łączna siła bojowa wszystkich wystawionych sił oraz rezerwa siły żywej. Siła żywa liczy się jedynie do czterokrotności pojemności armii regularnej kraju, odzwierciedlając praktyczne ograniczenia uzupełnień. Powoływanie lub zwalnianie oddziałów poborowych nie wpływa na nią, liczą się tylko rzeczywiste straty, uzupełnianie i nowy pobór."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "Presja dyplomatyczna"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "[subjects|e] z ograniczoną dyplomacją i partnerzy [coalition|e], którzy nie mogą samodzielnie negocjować pokoju, wywierają wpływ polityczny na przywódcę wojennego. Gdy ich [war_exhaustion|e] przekroczy 5, naciskają na przywódcę, by zakończył konflikt. Członkowie koalicji, którzy są jeszcze świeży (poniżej 5 wyczerpania wojennego), faktycznie wzmacniają pozycję przywódcy, zmniejszając wyczerpanie wojenne. Wpływ każdego partnera jest ważony jego znaczeniem ekonomicznym w stosunku do przywódcy."
 game_concept_noicthy_war_momentum_occupation:0 "Okupowane terytorium"
 game_concept_noicthy_war_momentum_occupation_desc:0 "Obrona fortów jest zmniejszana, a wyczerpanie wojenne rośnie w zależności od tego, ile terytorium kraju znajduje się pod okupacją wroga. Lokacje z fortami liczą się pięć razy mocniej. Terytorium zajęte przez narody zdolne do automatycznego podboju nadal liczy się jako okupacja dla obrońcy nawet po przeniesieniu własności."
 game_concept_noicthy_war_momentum_capital:0 "Odporność stolicy"
 game_concept_noicthy_war_momentum_capital_desc:0 "Stolica opiera się połowie kary z [noicthy_war_momentum|E] do obrony fortów, reprezentując skoncentrowaną obronę siedziby władzy."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "Stolica wpadła w ręce wroga, demoralizując cały naród i osłabiając jego pozostałe obrony."
 game_concept_noicthy_war_momentum_capital_fallen:0 "Upadek stolicy"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "Gdy stolica jest pod okupacją wroga, wszystkie forty w kraju tracą obronność. Siedziba władzy upadła, nikt nie przyjdzie z pomocą."
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
