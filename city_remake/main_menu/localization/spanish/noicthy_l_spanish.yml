l_spanish:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "Reduce la defensa de fortaleza según la proporción de fuerza militar perdida desde el pico alcanzado en tiempos de guerra."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "Aumenta el agotamiento bélico según la proporción de la fuerza militar de un país que ha sido agotada. El poder de combate del ejército y la soldadesca en reserva contribuyen por igual."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "El agotamiento bélico está influenciado por las actitudes de los súbditos y los socios de coalición. Los aliados hastiados de la guerra ejercen presión, mientras que los miembros comprometidos de la coalición con bajo agotamiento bélico refuerzan la determinación del líder de guerra."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "Reduce la defensa de fortaleza y aumenta el agotamiento bélico según la proporción de territorio bajo ocupación enemiga. Las ubicaciones fortificadas cuentan cinco veces más."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "Compensa parcialmente las penalizaciones de defensa de fortaleza en la capital. La capital resiste la mitad de la penalización de [noicthy_war_momentum|E]."
 game_concept_noicthy_war_momentum:0 "Impulso bélico"
 game_concept_noicthy_war_momentum_desc:0 "A medida que la [noicthy_war_momentum_army_exhaustion|E] se agota, el agotamiento bélico aumenta y las fortalezas se vuelven más fáciles de asediar. El [noicthy_war_momentum_occupation|E] amplifica ambos efectos. La [noicthy_war_momentum_diplomatic_pressure|E] puede acelerar o frenar el declive según el compromiso de los aliados. La [noicthy_war_momentum_capital|E] proporciona protección parcial, pero si la capital cae, [noicthy_war_momentum_capital_fallen|E] golpea."
 game_concept_noicthy_war_momentum_army:0 "Fuerza militar"
 game_concept_noicthy_war_momentum_army_desc:0 "La defensa de fortaleza se reduce según la proporción de fuerza militar perdida desde el pico alcanzado en tiempos de guerra. Los súbditos que luchan junto a su señor combinan su fuerza militar, por lo que un estado tapón respaldado por un señor fuerte mantiene sus fortalezas intactas."
 game_concept_noicthy_war_momentum_army_exhaustion:0 "Fuerza militar"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "El agotamiento bélico aumenta según la proporción de la fuerza militar de un país que ha sido agotada. La fuerza militar es el poder de combate combinado de todas las fuerzas desplegadas más la soldadesca en reserva. La soldadesca solo cuenta hasta cuatro veces la capacidad del ejército regular de un país, reflejando los límites prácticos del refuerzo. Reclutar o licenciar levas no la modifica, solo las pérdidas reales, la reposición y el nuevo reclutamiento cuentan."
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "Presión diplomática"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "Los [subjects|e] con diplomacia limitada y los socios de [coalition|e] que no pueden negociar la paz por su cuenta ejercen influencia política sobre el líder de guerra. Cuando su [war_exhaustion|e] supera 5, presionan al líder para poner fin al conflicto. Los miembros de la coalición que aún están frescos (por debajo de 5 de agotamiento bélico) en realidad fortalecen la posición del líder, reduciendo el agotamiento bélico. La influencia de cada socio se pondera por su importancia económica en relación con el líder."
 game_concept_noicthy_war_momentum_occupation:0 "Territorio nacional ocupado"
 game_concept_noicthy_war_momentum_occupation_desc:0 "La defensa de fortaleza se reduce y el agotamiento bélico aumenta según la proporción del territorio de un país bajo ocupación enemiga. Las ubicaciones con fortalezas cuentan cinco veces más. El territorio tomado por naciones con capacidades de conquista automática sigue contando como ocupación para el defensor incluso después de la transferencia de propiedad."
 game_concept_noicthy_war_momentum_capital:0 "Resistencia de la capital"
 game_concept_noicthy_war_momentum_capital_desc:0 "La capital resiste la mitad de la penalización de [noicthy_war_momentum|E] a la defensa de fortaleza, representando la defensa concentrada de la sede del poder."
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "La capital ha caído en manos del enemigo, desmoralizando a toda la nación y debilitando sus defensas restantes."
 game_concept_noicthy_war_momentum_capital_fallen:0 "Caída de la capital"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "Cuando la capital está bajo ocupación enemiga, todas las fortalezas de la nación sufren una reducción en su defensa. La sede del poder ha caído, nadie vendrá a ayudar."
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
 NOICTHY_POTENTIAL_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_FORT_TOTAL_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_HEADER:0 "[noicthy_war_momentum_occupation|E]"
 NOICTHY_OCCUPATION_FORTS:0 "[noicthy_fortified_locations|E]"
 NOICTHY_OCCUPATION_LOCATIONS:0 "[noicthy_unfortified_locations|E]"
 NOICTHY_OCCUPATION_DEFENSE_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_EXHAUSTION_LABEL:0 "Agotamiento bélico"
 NOICTHY_CAPITAL_FALLEN_HEADER:0 "[noicthy_war_momentum_capital_fallen|E]"
 NOICTHY_CAPITAL_RESILIENCE_HEADER:0 "[noicthy_war_momentum_capital|E]"
 NOICTHY_PRESSURE_BREAKDOWN_HEADER:0 "Fuentes de [noicthy_war_momentum_diplomatic_pressure|E]"
 NOICTHY_PRESSURE_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_CW_CROWN_FORTS:0 "Ubicaciones fortificadas de la [noicthy_civil_war_crown|E]"
 NOICTHY_CW_CROWN_LOCS:0 "Ubicaciones sin fortificar de la [noicthy_civil_war_crown|E]"
 NOICTHY_CW_PRETENDER_FORTS:0 "Ubicaciones fortificadas del [noicthy_civil_war_pretender|E]"
 NOICTHY_CW_PRETENDER_LOCS:0 "Ubicaciones sin fortificar del [noicthy_civil_war_pretender|E]"
 game_concept_noicthy_civil_war_crown:0 "Corona"
 game_concept_noicthy_civil_war_crown_desc:0 "Territorio controlado por el gobierno en el poder durante una guerra civil. El bando que controle más territorio ponderado (las ubicaciones fortificadas cuentan cinco veces más) obtiene la ventaja. Si la corona controla menos que el pretendiente, se aplican penalizaciones de ocupación."
 game_concept_noicthy_civil_war_pretender:0 "Pretendiente"
 game_concept_noicthy_civil_war_pretender_desc:0 "Territorio controlado por la facción rebelde durante una guerra civil. El bando que controle más territorio ponderado (las ubicaciones fortificadas cuentan cinco veces más) obtiene la ventaja. Si el pretendiente controla más que la corona, la corona sufre penalizaciones de ocupación."
