l_japanese:
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army:0 "[noicthy_war_momentum_army|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army:0 "戦時中のピークからどれだけ軍事力が失われたかに基づいて、要塞の防衛を低下させる。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_army_exhaustion:0 "[noicthy_war_momentum_army_exhaustion|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_army_exhaustion:0 "国の軍事力がどれだけ消耗したかに基づいて戦争疲弊を増加させる。軍の戦闘力と人的資源の備蓄の両方が寄与する。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_diplomatic_pressure:0 "[noicthy_war_momentum_diplomatic_pressure|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_diplomatic_pressure:0 "戦争疲弊は臣下や連合パートナーの態度に影響される。戦争に疲弊した同盟国は圧力をかけるが、戦争疲弊の低い献身的な連合メンバーは戦争指導者の決意を強化する。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_occupation:0 "[noicthy_war_momentum_occupation|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_occupation:0 "敵に占領された領土の割合に基づいて、要塞の防衛を低下させ、戦争疲弊を増加させる。要塞化された拠点は5倍の重みで計算される。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital:0 "[noicthy_war_momentum_capital|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital:0 "首都における要塞防衛のペナルティを部分的に相殺する。首都は[noicthy_war_momentum|E]ペナルティの半分に抵抗する。"
 game_concept_noicthy_war_momentum:0 "戦争の勢い"
 game_concept_noicthy_war_momentum_desc:0 "[noicthy_war_momentum_army_exhaustion|E]が消耗するにつれ、戦争疲弊が高まり、要塞の攻略が容易になる。[noicthy_war_momentum_occupation|E]は両方の効果を増幅する。[noicthy_war_momentum_diplomatic_pressure|E]は同盟の関与度に応じて衰退を加速または減速させる。[noicthy_war_momentum_capital|E]は部分的な保護を提供するが、首都が陥落すれば[noicthy_war_momentum_capital_fallen|E]が発動する。"
 game_concept_noicthy_war_momentum_army:0 "軍事力"
 game_concept_noicthy_war_momentum_army_desc:0 "戦時中のピークからどれだけ軍事力が失われたかに基づいて、要塞の防衛が低下する。宗主の下で戦う臣下は軍事力を合算するため、強力な宗主に支えられた緩衝国は要塞を無傷に保つ。"
 game_concept_noicthy_war_momentum_army_exhaustion:0 "軍事力"
 game_concept_noicthy_war_momentum_army_exhaustion_desc:0 "国の軍事力がどれだけ消耗したかに基づいて戦争疲弊が上昇する。軍事力は、展開中の全軍の戦闘力と人的資源の備蓄を合算したものである。人的資源は国の正規連隊の定員の4倍までしか算入されず、増援の実際的限界を反映している。召集軍の召集や解散では変化せず、実際の損失、補充、新規徴募のみが影響する。"
 game_concept_noicthy_war_momentum_diplomatic_pressure:0 "外交圧力"
 game_concept_noicthy_war_momentum_diplomatic_pressure_desc:0 "外交力の限られた[subjects|e]や、独自に和平交渉ができない[coalition|e]パートナーは、戦争指導者に政治的影響力を行使する。彼らの[war_exhaustion|e]が5を超えると、指導者に紛争の終結を迫る。まだ余力のある連合メンバー（戦争疲弊5未満）は実際には指導者の立場を強化し、戦争疲弊を減少させる。各パートナーの影響力は、指導者に対する経済的重要性によって重み付けされる。"
 game_concept_noicthy_war_momentum_occupation:0 "占領された国土"
 game_concept_noicthy_war_momentum_occupation_desc:0 "国の領土がどれだけ敵に占領されているかに基づいて、要塞の防衛が低下し、戦争疲弊が上昇する。要塞のある拠点は5倍の重みで計算される。自動征服能力を持つ国家が奪取した領土は、所有権の移転後も防衛側にとって占領として算入され続ける。"
 game_concept_noicthy_war_momentum_capital:0 "首都の抵抗力"
 game_concept_noicthy_war_momentum_capital_desc:0 "首都は要塞防衛に対する[noicthy_war_momentum|E]ペナルティの半分に抵抗し、権力の中枢における集中的な防衛を表す。"
 STATIC_MODIFIER_NAME_noicthy_war_momentum_capital_fallen:0 "[noicthy_war_momentum_capital_fallen|E]"
 STATIC_MODIFIER_DESC_noicthy_war_momentum_capital_fallen:0 "首都が敵の占領下に陥り、国全体の士気を低下させ、残りの防衛を弱体化させている。"
 game_concept_noicthy_war_momentum_capital_fallen:0 "首都陥落"
 game_concept_noicthy_war_momentum_capital_fallen_desc:0 "首都が敵の占領下にあるとき、国中のすべての要塞は防衛が低下する。権力の中枢は陥落した。誰も助けには来ない。"
 NOICTHY_POTENTIAL_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_army_exhaustion|E]"
 NOICTHY_POTENTIAL_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_FORT_TOTAL_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_HEADER:0 "[noicthy_war_momentum_occupation|E]"
 NOICTHY_OCCUPATION_FORTS:0 "[noicthy_fortified_locations|E]"
 NOICTHY_OCCUPATION_LOCATIONS:0 "[noicthy_unfortified_locations|E]"
 NOICTHY_OCCUPATION_DEFENSE_LABEL:0 "[ShowModifierTypeName('global_defensive')]"
 NOICTHY_OCCUPATION_EXHAUSTION_LABEL:0 "戦争疲弊"
 NOICTHY_CAPITAL_FALLEN_HEADER:0 "[noicthy_war_momentum_capital_fallen|E]"
 NOICTHY_CAPITAL_RESILIENCE_HEADER:0 "[noicthy_war_momentum_capital|E]"
 NOICTHY_PRESSURE_BREAKDOWN_HEADER:0 "[noicthy_war_momentum_diplomatic_pressure|E]の源泉"
 NOICTHY_PRESSURE_TOTAL_LABEL:0 "[ShowModifierTypeName('monthly_war_exhaustion')]"
 NOICTHY_CW_CROWN_FORTS:0 "[noicthy_civil_war_crown|E]の要塞拠点"
 NOICTHY_CW_CROWN_LOCS:0 "[noicthy_civil_war_crown|E]の非要塞拠点"
 NOICTHY_CW_PRETENDER_FORTS:0 "[noicthy_civil_war_pretender|E]の要塞拠点"
 NOICTHY_CW_PRETENDER_LOCS:0 "[noicthy_civil_war_pretender|E]の非要塞拠点"
 game_concept_noicthy_civil_war_crown:0 "王冠派"
 game_concept_noicthy_civil_war_crown_desc:0 "内戦中に統治政府が保持する領土。より多くの加重領土を支配する側（要塞拠点は5倍で計算）が優位に立つ。王冠派が僭称者より少なく保持している場合、占領ペナルティが適用される。"
 game_concept_noicthy_civil_war_pretender:0 "僭称者"
 game_concept_noicthy_civil_war_pretender_desc:0 "内戦中に反乱勢力が保持する領土。より多くの加重領土を支配する側（要塞拠点は5倍で計算）が優位に立つ。僭称者が王冠派より多く保持している場合、王冠派は占領ペナルティを受ける。"
